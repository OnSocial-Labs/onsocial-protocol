# =============================================================================
# OnSocial Production Stack — Single Server (Hetzner)
# =============================================================================
# 
# Architecture: Internet → Caddy (TLS) → Gateway → Hasura / Relayer
#               Hasura, Relayer, Postgres are internal-only (not internet-facing).
#               Substreams sinks run as systemd services.
#
# Admin access (SSH tunnel from your machine):
#   ssh -L 8080:localhost:8080 your-server   # Hasura Console
#   ssh -L 5432:localhost:5432 your-server   # Postgres
#   ssh -L 3040:localhost:3040 your-server   # Relayer
#
# Usage:
#   Secrets are pulled from GSM by deploy-production.sh — no manual .env needed.
#   deployment/deploy-production.sh testnet <server-ip>
#   docker compose --env-file .env.production up -d
#
# DNS required (single A record → server IP):
#   api.onsocial.id

services:
  # =========================================================================
  # REVERSE PROXY — Auto TLS via Let's Encrypt
  # =========================================================================
  caddy:
    image: ghcr.io/onsocial-labs/onsocial-protocol/caddy:${IMAGE_TAG:-latest}
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    depends_on:
      gateway:
        condition: service_healthy
      backend:
        condition: service_healthy

  # =========================================================================
  # DATABASE
  # =========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    ports:
      - "127.0.0.1:5432:5432"  # Localhost only — not exposed to internet
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-extra-dbs.sh:/docker-entrypoint-initdb.d/02-extra-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 4g
    cpus: 2.0
    shm_size: 256mb
    command:
      - "postgres"
      - "-c" 
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=6GB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "random_page_cost=1.1"       # NVMe SSD
      - "-c"
      - "effective_io_concurrency=200" # NVMe SSD
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "log_min_duration_statement=1000"  # Log slow queries >1s

  # =========================================================================
  # GRAPHQL ENGINE
  # =========================================================================
  hasura:
    image: hasura/graphql-engine:v2.40.0
    container_name: hasura
    # No public port — gateway proxies via Docker network
    # For admin access: ssh -L 8080:localhost:8080 your-server
    ports:
      - "127.0.0.1:8080:8080"  # Localhost only — SSH tunnel for admin
    restart: unless-stopped
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_ADMIN_SECRET}
      HASURA_GRAPHQL_ENABLE_CONSOLE: ${HASURA_ENABLE_CONSOLE:-false}  # Enable via SSH tunnel only
      HASURA_GRAPHQL_ENABLE_TELEMETRY: "false"
      HASURA_GRAPHQL_EXPERIMENTAL_FEATURES: "naming_convention"
      HASURA_GRAPHQL_DEFAULT_NAMING_CONVENTION: "graphql-default"
      HASURA_GRAPHQL_PG_CONNECTIONS: 50
      HASURA_GRAPHQL_CORS_DOMAIN: ${HASURA_GRAPHQL_CORS_DOMAIN:-https://api.onsocial.id}
      HASURA_GRAPHQL_LOG_LEVEL: "warn"
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: "anonymous"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 1g
    cpus: 1.0
    depends_on:
      postgres:
        condition: service_healthy

  # =========================================================================
  # API GATEWAY
  # =========================================================================
  gateway:
    image: ghcr.io/onsocial-labs/onsocial-protocol/gateway:${IMAGE_TAG:-latest}
    container_name: gateway
    # No public port — Caddy proxies via Docker network
    expose:
      - "8080"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8080"
      HASURA_URL: http://hasura:8080/v1/graphql
      HASURA_ADMIN_SECRET: ${HASURA_ADMIN_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      LIGHTHOUSE_API_KEY: ${LIGHTHOUSE_API_KEY}
      NEAR_NETWORK: ${NEAR_NETWORK:-testnet}
      SOCIAL_TOKEN_CONTRACT: ${SOCIAL_TOKEN_CONTRACT:-}
      STAKING_CONTRACT: ${STAKING_CONTRACT:-}
      NEARBLOCKS_API_URL: ${NEARBLOCKS_API_URL:-https://api.nearblocks.io}
      NEARBLOCKS_API_KEY: ${NEARBLOCKS_API_KEY:-}
      LAVA_API_KEY: ${LAVA_API_KEY:-}
      RELAYER_URL: ${RELAYER_URL:-http://relayer-lb:3040}
      RELAYER_API_KEY: ${RELAYER_API_KEY}
      ADMIN_WALLETS: ${ADMIN_WALLETS:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      REVOLUT_ENVIRONMENT: ${REVOLUT_ENVIRONMENT:-}
      REVOLUT_SECRET_KEY: ${REVOLUT_SECRET_KEY:-}
      REVOLUT_PUBLIC_KEY: ${REVOLUT_PUBLIC_KEY:-}
      REVOLUT_WEBHOOK_SIGNING_SECRET: ${REVOLUT_WEBHOOK_SIGNING_SECRET:-}
      REVOLUT_SECRET_KEY_SANDBOX: ${REVOLUT_SECRET_KEY_SANDBOX:-}
      REVOLUT_PUBLIC_KEY_SANDBOX: ${REVOLUT_PUBLIC_KEY_SANDBOX:-}
      REVOLUT_WEBHOOK_SIGNING_SECRET_SANDBOX: ${REVOLUT_WEBHOOK_SIGNING_SECRET_SANDBOX:-}
      REVOLUT_SECRET_KEY_PRODUCTION: ${REVOLUT_SECRET_KEY_PRODUCTION:-}
      REVOLUT_PUBLIC_KEY_PRODUCTION: ${REVOLUT_PUBLIC_KEY_PRODUCTION:-}
      REVOLUT_WEBHOOK_SIGNING_SECRET_PRODUCTION: ${REVOLUT_WEBHOOK_SIGNING_SECRET_PRODUCTION:-}
      REVOLUT_PRO_VARIATION_ID: ${REVOLUT_PRO_VARIATION_ID:-}
      REVOLUT_SCALE_VARIATION_ID: ${REVOLUT_SCALE_VARIATION_ID:-}
      REVOLUT_PRO_VARIATION_ID_SANDBOX: ${REVOLUT_PRO_VARIATION_ID_SANDBOX:-}
      REVOLUT_SCALE_VARIATION_ID_SANDBOX: ${REVOLUT_SCALE_VARIATION_ID_SANDBOX:-}
      REVOLUT_PRO_VARIATION_ID_PRODUCTION: ${REVOLUT_PRO_VARIATION_ID_PRODUCTION:-}
      REVOLUT_SCALE_VARIATION_ID_PRODUCTION: ${REVOLUT_SCALE_VARIATION_ID_PRODUCTION:-}
      REVOLUT_API_URL: ${REVOLUT_API_URL:-}
      REVOLUT_API_VERSION: ${REVOLUT_API_VERSION:-}
      REVOLUT_API_URL_SANDBOX: ${REVOLUT_API_URL_SANDBOX:-}
      REVOLUT_API_VERSION_SANDBOX: ${REVOLUT_API_VERSION_SANDBOX:-}
      REVOLUT_API_URL_PRODUCTION: ${REVOLUT_API_URL_PRODUCTION:-}
      REVOLUT_API_VERSION_PRODUCTION: ${REVOLUT_API_VERSION_PRODUCTION:-}
    depends_on:
      hasura:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 512m
    cpus: 1.0
    read_only: true
    tmpfs:
      - /tmp

  notification-worker:
    image: ghcr.io/onsocial-labs/onsocial-protocol/gateway:${IMAGE_TAG:-latest}
    container_name: notification-worker
    restart: unless-stopped
    command: ["node", "packages/onsocial-gateway/dist/scripts/run-notification-worker.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      HASURA_URL: http://hasura:8080/v1/graphql
      HASURA_ADMIN_SECRET: ${HASURA_ADMIN_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      LIGHTHOUSE_API_KEY: ${LIGHTHOUSE_API_KEY}
      NEAR_NETWORK: ${NEAR_NETWORK:-testnet}
      SOCIAL_TOKEN_CONTRACT: ${SOCIAL_TOKEN_CONTRACT:-}
      STAKING_CONTRACT: ${STAKING_CONTRACT:-}
      NEARBLOCKS_API_URL: ${NEARBLOCKS_API_URL:-https://api.nearblocks.io}
      NEARBLOCKS_API_KEY: ${NEARBLOCKS_API_KEY:-}
      LAVA_API_KEY: ${LAVA_API_KEY:-}
      RELAYER_URL: ${RELAYER_URL:-http://relayer-lb:3040}
      RELAYER_API_KEY: ${RELAYER_API_KEY}
      ADMIN_WALLETS: ${ADMIN_WALLETS:-}
      NOTIFICATION_WORKER_POLL_INTERVAL_MS: ${NOTIFICATION_WORKER_POLL_INTERVAL_MS:-15000}
      NOTIFICATION_WORKER_BATCH_SIZE: ${NOTIFICATION_WORKER_BATCH_SIZE:-250}
    depends_on:
      hasura:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'run-notification-worker.js' >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 256m
    cpus: 0.5
    read_only: true
    tmpfs:
      - /tmp

  # =========================================================================
  # TELEGRAM REWARDS BACKEND (OnSocial Pulse)
  # =========================================================================
  backend:
    image: ghcr.io/onsocial-labs/onsocial-protocol/backend:${IMAGE_TAG:-latest}
    container_name: backend
    expose:
      - "4001"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4001"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/onsocial_backend
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_GROUP_IDS: "-1002402150258"
      BOT_USERNAME: ${BOT_USERNAME:-onsocial_pulse_bot}
      NEAR_NETWORK: ${NEAR_NETWORK:-testnet}
      RELAYER_URL: ${RELAYER_URL:-http://relayer-lb:3040}
      RELAYER_API_KEY: ${RELAYER_API_KEY}
      WEBHOOK_URL: https://${PUBLIC_DOMAIN}/webhooks/telegram
      ADMIN_SECRET: ${ADMIN_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 256m
    cpus: 0.5

  # =========================================================================
  # NEAR TRANSACTION RELAYER — Two instances for zero-downtime deploys.
  # Each gets its own KMS keyring (separate admin nonces → no conflicts).
  # Gateway talks to relayer-lb (Caddy upstream), which round-robins
  # between relayer-0 and relayer-1 with /ready health checks.
  # =========================================================================

  # --- Internal load balancer for relayer instances ---
  relayer-lb:
    image: caddy:2-alpine
    container_name: relayer-lb
    expose:
      - "3040"
    ports:
      - "127.0.0.1:3040:3040"
    volumes:
      - ./Caddyfile.relayer:/etc/caddy/Caddyfile:ro
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    depends_on:
      relayer-0:
        condition: service_healthy
      relayer-1:
        condition: service_healthy

  relayer-0: &relayer-base
    image: ghcr.io/onsocial-labs/onsocial-protocol/relayer:${IMAGE_TAG:-latest}
    container_name: relayer-0
    expose:
      - "3040"
    restart: unless-stopped
    environment: &relayer-env
      RUST_LOG: info
      RELAYER_SIGNER_MODE: kms
      RELAYER_ACCOUNT_ID: ${RELAYER_ACCOUNT_ID:-relayer.onsocial.testnet}
      RELAYER_ALLOWED_CONTRACTS: ${RELAYER_ALLOWED_CONTRACTS:-core.onsocial.testnet,scarces.onsocial.testnet,rewards.onsocial.testnet}
      RELAYER_API_KEY: ${RELAYER_API_KEY}
      LAVA_API_KEY: ${LAVA_API_KEY:-}
      GCP_KMS_PROJECT: ${GCP_KMS_PROJECT:-onsocial-protocol}
      GCP_KMS_LOCATION: ${GCP_KMS_LOCATION:-global}
      GCP_KMS_ADMIN_KEY: admin-key
      # ── Key pool sizing ──────────────────────────────────────────
      # Pool size = keys_per_contract × num_contracts (all equal).
      # Round-robin allocation: pool-key-{i} → contracts[i % N].
      # Scale: increase pool size, create KMS keys, run register script.
      GCP_KMS_POOL_SIZE: ${GCP_KMS_POOL_SIZE:-30}
      RELAYER_MIN_KEYS: ${RELAYER_MIN_KEYS:-30}
      # allowed_contracts defaults are set in config.rs (core + scarces + rewards per network)
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-sa.json
      # Instance 0 uses the original keyring
      GCP_KMS_KEYRING: ${GCP_KMS_KEYRING_0:-relayer-keys-testnet}
    volumes:
      - ./secrets/relayer-signer.json:/run/secrets/gcp-sa.json:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/3040'"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: 1.0

  relayer-1:
    <<: *relayer-base
    container_name: relayer-1
    environment:
      <<: *relayer-env
      # Instance 1 uses a separate keyring (separate admin key → no nonce conflicts)
      GCP_KMS_KEYRING: ${GCP_KMS_KEYRING_1:-relayer-keys-inst-1}

  # =========================================================================
  # MONITORING — Uptime Kuma (lightweight, self-hosted)
  # =========================================================================
  # Access: ssh -L 3001:localhost:3001 your-server → http://localhost:3001
  # First-time: create admin user and add monitors:
  #   - https://<PUBLIC_DOMAIN>/health  (gateway via Caddy)
  #   - http://hasura:8080/healthz      (Hasura internal)
  #   - http://relayer-0:3040/ready     (Relayer instance 0)
  #   - http://relayer-1:3040/ready     (Relayer instance 1)
  # Supports: Discord, Slack, Telegram, email notifications
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    ports:
      - "127.0.0.1:3001:3001"  # Localhost only — SSH tunnel for admin
    volumes:
      - uptime_kuma_data:/app/data
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5

  # =========================================================================
  # DATABASE BACKUP — Daily pg_dump to local volume + 7-day retention
  # =========================================================================
  # Backups stored in /backups inside the container (postgres_backups volume).
  # To download: ssh root@server "docker cp postgres-backup:/backups/latest.sql.gz -" > backup.sql.gz
  # To restore:  gunzip -c backup.sql.gz | docker exec -i postgres psql -U $POSTGRES_USER -d $POSTGRES_DB
  postgres-backup:
    image: postgres:15-alpine
    container_name: postgres-backup
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - postgres_backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Postgres backup cron: daily at 03:00 UTC, 7-day retention"
        while true; do
          # Sleep until next 03:00 UTC
          NOW=$$(date +%s)
          NEXT=$$(date -d "tomorrow 03:00" +%s 2>/dev/null || date -d "03:00" +%s)
          [ "$$NEXT" -le "$$NOW" ] && NEXT=$$((NEXT + 86400))
          DELAY=$$((NEXT - NOW))
          echo "Next backup in $${DELAY}s (at $$(date -d @$$NEXT -u '+%Y-%m-%d %H:%M UTC' 2>/dev/null || echo 'next 03:00 UTC'))"
          sleep "$$DELAY"
          # Run backup
          STAMP=$$(date -u '+%Y%m%d-%H%M%S')
          echo "Starting backup: $$STAMP"
          if pg_dump --clean --if-exists | gzip > "/backups/onsocial-$$STAMP.sql.gz"; then
            cp "/backups/onsocial-$$STAMP.sql.gz" /backups/latest.sql.gz
            echo "✅ Backup complete: onsocial-$$STAMP.sql.gz ($$(du -h /backups/onsocial-$$STAMP.sql.gz | cut -f1))"
          else
            echo "❌ Backup FAILED at $$STAMP"
          fi
          # Prune backups older than 7 days
          find /backups -name 'onsocial-*.sql.gz' -mtime +7 -delete
          echo "Retained backups: $$(ls /backups/onsocial-*.sql.gz 2>/dev/null | wc -l)"
        done
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.25
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  postgres_backups:  # Daily pg_dump backups — 7-day retention
  caddy_data:
  caddy_config:
  uptime_kuma_data:
