# =============================================================================
# OnSocial Pages Stack — Separate from App/Data stacks
# =============================================================================
#
# Renders profile pages at the configured public page base domain.
# Uses the gateway data API for page aggregation.
#
# Deploy independently:
#   deployment/deploy-pages-production.sh <testnet|mainnet> <server-ip>

services:
  pages-caddy:
    image: caddy:2-alpine
    container_name: pages-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.pages:/etc/caddy/Caddyfile:ro
      - pages_caddy_data:/data
      - pages_caddy_config:/config
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    depends_on:
      pages:
        condition: service_healthy

  pages:
    image: ghcr.io/onsocial-labs/onsocial-protocol/pages:${IMAGE_TAG:-latest}
    container_name: pages
    expose:
      - "3456"
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    environment:
      NODE_ENV: production
      PORT: "3456"
      DATA_API_URL: ${DATA_API_URL:-https://testnet.onsocial.id}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-https://testnet.onsocial.id}
      PUBLIC_PAGE_BASE_DOMAIN: ${PUBLIC_PAGE_BASE_DOMAIN:-testnet.onsocial.id}
      NEAR_RPC_URL: ${NEAR_RPC_URL:-https://rpc.testnet.near.org}
      CORE_CONTRACT: ${CORE_CONTRACT:-core.onsocial.testnet}
      NEAR_NETWORK: ${NEAR_NETWORK:-testnet}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3456/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  pages_caddy_data:
  pages_caddy_config:
