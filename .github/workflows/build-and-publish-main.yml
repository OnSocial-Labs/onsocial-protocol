name: Build and Publish Main Images

'on':
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'packages/onsocial-gateway/**'
      - 'packages/onsocial-backend/**'
      - 'packages/onsocial-relayer/**'
      - 'packages/onsocial-rpc/**'
      - 'crates/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.json'
      - '.github/workflows/build-and-publish-main.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/onsocial-labs/onsocial-protocol

jobs:
  build-and-publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: caddy
            dockerfile: docker/Dockerfile.caddy
            context: docker
          - image: gateway
            dockerfile: docker/Dockerfile.gateway
            context: .
          - image: backend
            dockerfile: docker/Dockerfile.backend
            context: .
          - image: relayer
            dockerfile: docker/Dockerfile.relayer
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value=main-latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}