name: Substreams CI

on:
  push:
    branches: [main]
    paths:
      - 'indexers/substreams/**'
      - '.github/workflows/substreams-ci.yml'
      - '.github/workflows/deploy-substreams-testnet.yml'
  pull_request:
    paths:
      - 'indexers/substreams/**'
      - '.github/workflows/substreams-ci.yml'
      - '.github/workflows/deploy-substreams-testnet.yml'

defaults:
  run:
    working-directory: indexers/substreams

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: indexers/substreams -> target

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Cargo check (native)
        run: cargo check --all-targets

      - name: Cargo test
        run: cargo test

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install substreams CLI
        run: |
          curl -sL https://github.com/streamingfast/substreams/releases/latest/download/substreams_linux_x86_64.tar.gz | tar xz -C /usr/local/bin
          substreams --version

      - name: Extract version from substreams.yaml
        id: ver
        run: |
          VER=$(grep -m1 'version:' substreams.yaml | awk '{print $2}')
          echo "version=$VER" >> "$GITHUB_OUTPUT"

      - name: Pack all spkgs
        run: ./pack.sh

      - name: Upload spkg artifacts
        if: "github.ref == 'refs/heads/main'"
        uses: actions/upload-artifact@v4
        with:
          name: substreams-spkg
          path: indexers/substreams/onsocial-events-*.spkg
          retention-days: 30
