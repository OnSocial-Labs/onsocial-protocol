name: Deploy Substreams (Testnet)

on:
  workflow_run:
    workflows: ["Substreams CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      clean_deploy:
        description: "Drop all tables and re-index from scratch"
        type: boolean
        default: false

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  deploy:
    name: Deploy spkg to Hetzner
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: indexers/substreams -> target

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Extract version from substreams.yaml
        id: ver
        working-directory: indexers/substreams
        run: |
          VER=$(grep -m1 'version:' substreams.yaml | awk '{print $2}')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VER"

      - name: Build WASM
        working-directory: indexers/substreams
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install substreams CLI
        run: |
          curl -sL https://github.com/streamingfast/substreams/releases/latest/download/substreams_linux_x86_64.tar.gz | tar xz -C /usr/local/bin
          substreams --version

      - name: Pack all spkgs
        working-directory: indexers/substreams
        run: ./pack.sh

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Step 1: Upload spkgs + schema to server staging directory
      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/87856119115/locations/global/workloadIdentityPools/github-ci/providers/github-oidc"
          service_account: "github-ci-deploy@onsocial-protocol.iam.gserviceaccount.com"

      - name: Fetch SSH key from Secret Manager
        id: ssh
        run: |
          gcloud secrets versions access latest \
            --secret="hetzner-testnet-ssh-key" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # Mask every line of the key so it never appears in logs
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done < /tmp/deploy_key
          echo "key<<SSHEOF" >> "$GITHUB_OUTPUT"
          cat /tmp/deploy_key >> "$GITHUB_OUTPUT"
          echo "SSHEOF" >> "$GITHUB_OUTPUT"
          rm -f /tmp/deploy_key

      - name: Prepare upload directory
        working-directory: indexers/substreams
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/spkg-upload
          cp onsocial-events-${VER}-*.spkg $GITHUB_WORKSPACE/spkg-upload/
          cp *_schema.sql $GITHUB_WORKSPACE/spkg-upload/
          echo "Upload contents:"
          ls -la $GITHUB_WORKSPACE/spkg-upload/

      - name: Upload spkgs and schemas
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 135.181.110.183
          username: root
          key: ${{ steps.ssh.outputs.key }}
          source: spkg-upload/*
          target: /tmp/onsocial-spkg-upload/
          strip_components: 1
          overwrite: true

      # Step 2: Stop sinks, swap spkgs, restart, health-check with rollback
      - name: Deploy and restart sinks
        uses: appleboy/ssh-action@v1
        env:
          VER: ${{ steps.ver.outputs.version }}
          CLEAN_DEPLOY: ${{ inputs.clean_deploy || 'false' }}
        with:
          host: 135.181.110.183
          username: root
          key: ${{ steps.ssh.outputs.key }}
          envs: VER,CLEAN_DEPLOY
          script: |
            set -euo pipefail
            SPKG_DIR=/root/onsocial-indexer
            UPLOAD_DIR=/tmp/onsocial-spkg-upload

            echo "=== Substreams deploy: ${{ steps.sha.outputs.short }} (${VER}) ==="

            # Discover contract variants dynamically from uploaded spkg filenames
            CONTRACTS=()
            for f in ${UPLOAD_DIR}/onsocial-events-${VER}-*.spkg; do
              [ -f "$f" ] || continue
              variant=$(basename "$f" .spkg | sed "s/onsocial-events-${VER}-//")
              CONTRACTS+=("$variant")
            done
            if [ ${#CONTRACTS[@]} -eq 0 ]; then
              echo "❌ No spkg files found in ${UPLOAD_DIR}"
              exit 1
            fi
            echo "✓ Discovered ${#CONTRACTS[@]} contracts: ${CONTRACTS[*]}"

            # Build space-separated service names for systemctl
            SERVICES=""
            for c in "${CONTRACTS[@]}"; do SERVICES+=" onsocial-sink-$c"; done

            # Stop sinks (ignore errors for services that don't exist yet)
            systemctl stop $SERVICES 2>/dev/null || true
            echo "✓ Sinks stopped"

            # Clean deploy: drop all tables and re-apply schema
            if [ "$CLEAN_DEPLOY" = "true" ]; then
              echo "🧹 Clean deploy requested — dropping tables and cursors"
              if [ -f /root/.onsocial-sink-db-url ]; then
                DB_URL=$(cat /root/.onsocial-sink-db-url)
              else
                DB_URL="${DATABASE_URL:-}"
              fi
              if [ -n "$DB_URL" ]; then
                # Drop all known tables (safe if they don't exist)
                psql "$DB_URL" -c "
                  DO \$\$ DECLARE t TEXT;
                  BEGIN
                    FOR t IN SELECT tablename FROM pg_tables
                      WHERE schemaname = 'public' AND tablename != 'schema_migrations'
                    LOOP EXECUTE 'DROP TABLE IF EXISTS ' || t || ' CASCADE'; END LOOP;
                  END \$\$;
                "
                echo "✓ Tables dropped"
                # Re-apply schemas
                for variant in "${CONTRACTS[@]}"; do
                  SCHEMA_FILE="${UPLOAD_DIR}/${variant}_schema.sql"
                  if [ -f "$SCHEMA_FILE" ]; then
                    psql "$DB_URL" -f "$SCHEMA_FILE"
                    echo "✓ Applied ${variant}_schema.sql"
                  fi
                done
              else
                echo "⚠️  No DB_URL found — skipping schema reset (apply manually)"
              fi
            fi

            # Remove old versioned spkgs (different version)
            find "$SPKG_DIR" -name 'onsocial-events-v*-*.spkg' ! -name "*-${VER}-*" -delete 2>/dev/null || true

            # Backup current spkgs
            for variant in "${CONTRACTS[@]}"; do
              CURRENT="${SPKG_DIR}/onsocial-events-${VER}-${variant}.spkg"
              [ -f "$CURRENT" ] && cp "$CURRENT" "${CURRENT}.prev"
            done

            # Move uploaded spkgs + schemas into place
            for variant in "${CONTRACTS[@]}"; do
              mv "${UPLOAD_DIR}/onsocial-events-${VER}-${variant}.spkg" \
                 "${SPKG_DIR}/onsocial-events-${VER}-${variant}.spkg"
            done
            # Copy schemas for reference
            cp "${UPLOAD_DIR}"/*_schema.sql "${SPKG_DIR}/" 2>/dev/null || true
            rm -rf "$UPLOAD_DIR"
            echo "✓ Spkgs swapped"

            # Create or update systemd service files
            DB_URL=""
            [ -f /root/.onsocial-sink-db-url ] && DB_URL=$(cat /root/.onsocial-sink-db-url)
            ENDPOINT="${SUBSTREAMS_ENDPOINT:-near-testnet.streamingfast.io:443}"

            for variant in "${CONTRACTS[@]}"; do
              UNIT="/etc/systemd/system/onsocial-sink-${variant}.service"
              if [ -f "$UNIT" ]; then
                # Existing unit — just update spkg version
                sed -i "s|onsocial-events-v[0-9.]*-${variant}.spkg|onsocial-events-${VER}-${variant}.spkg|g" "$UNIT"
              else
                # New contract — create systemd unit from template
                echo "📝 Creating new systemd unit: onsocial-sink-${variant}"
                cat > "$UNIT" <<UNITEOF
            [Unit]
            Description=OnSocial Substreams Sink - ${variant}
            After=network.target postgresql.service

            [Service]
            Type=simple
            Environment=SUBSTREAMS_API_TOKEN=
            ExecStart=/usr/local/bin/substreams-sink-sql run \
              ${DB_URL} \
              ${SPKG_DIR}/onsocial-events-${VER}-${variant}.spkg \
              -e ${ENDPOINT} \
              -p map_${variant}_output=contract_id=${variant}.onsocial.testnet \
              --infinite-retry
            Restart=on-failure
            RestartSec=15

            [Install]
            WantedBy=multi-user.target
            UNITEOF
              fi
            done
            systemctl daemon-reload
            echo "✓ Systemd units updated to ${VER}"

            # Restart sinks
            systemctl start $SERVICES
            echo "✓ Sinks started"

            # Health check — wait 20s then verify at least half are active
            sleep 20
            ACTIVE=0
            TOTAL=${#CONTRACTS[@]}
            for s in "${CONTRACTS[@]}"; do
              if systemctl is-active --quiet "onsocial-sink-$s"; then
                ACTIVE=$((ACTIVE + 1))
                echo "  ✅ $s: active"
              else
                echo "  ⚠️  $s: $(systemctl is-active onsocial-sink-$s)"
              fi
            done

            MIN_ACTIVE=$(( (TOTAL + 1) / 2 ))  # at least half (rounded up)
            if [ "$ACTIVE" -lt "$MIN_ACTIVE" ]; then
              echo ""
              echo "❌ Only $ACTIVE/$TOTAL sinks active after 20s — rolling back"
              for variant in "${CONTRACTS[@]}"; do
                PREV="${SPKG_DIR}/onsocial-events-${VER}-${variant}.spkg.prev"
                [ -f "$PREV" ] && mv "$PREV" "${SPKG_DIR}/onsocial-events-${VER}-${variant}.spkg"
              done
              systemctl restart $SERVICES || true
              exit 1
            fi

            # Cleanup backups on success
            rm -f ${SPKG_DIR}/*.spkg.prev

            echo ""
            echo "✅ Deploy complete — $ACTIVE/$TOTAL sinks active (${VER} @ ${{ steps.sha.outputs.short }})"

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          SHA="${{ steps.sha.outputs.short }}"
          VER="${{ steps.ver.outputs.version }}"
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          TOPIC_ID="${{ secrets.TELEGRAM_OPS_TOPIC_ID }}"
          [ -z "$TOKEN" ] || [ -z "$CHAT_ID" ] && exit 0

          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"; MSG="Substreams ${VER} deploy succeeded"
          else
            EMOJI="❌"; MSG="Substreams ${VER} deploy FAILED"
          fi

          TEXT="$EMOJI *$MSG* — \`$SHA\`
          [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          PAYLOAD="{\"chat_id\":\"$CHAT_ID\",\"text\":\"$TEXT\",\"parse_mode\":\"Markdown\""
          if [ -n "$TOPIC_ID" ]; then
            PAYLOAD="$PAYLOAD,\"message_thread_id\":$TOPIC_ID"
          fi
          PAYLOAD="$PAYLOAD}"

          curl -sf -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD" || true
