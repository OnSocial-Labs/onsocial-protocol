name: Deploy Substreams (Testnet)

on:
  workflow_run:
    workflows: ["Substreams CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      clean_deploy:
        description: "Drop all tables and re-index from scratch"
        type: boolean
        default: false

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  deploy:
    name: Deploy spkg to Hetzner
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: indexers/substreams -> target

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Extract version from substreams.yaml
        id: ver
        working-directory: indexers/substreams
        run: |
          VER=$(grep -m1 'version:' substreams.yaml | awk '{print $2}')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VER"

      - name: Build WASM
        working-directory: indexers/substreams
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install substreams CLI
        run: |
          curl -sL https://github.com/streamingfast/substreams/releases/latest/download/substreams_linux_x86_64.tar.gz | tar xz -C /usr/local/bin
          substreams --version

      - name: Pack all spkgs
        working-directory: indexers/substreams
        run: ./pack.sh

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Step 1: Upload spkgs + schema to server staging directory
      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/87856119115/locations/global/workloadIdentityPools/github-ci/providers/github-oidc"
          service_account: "github-ci-deploy@onsocial-protocol.iam.gserviceaccount.com"

      - name: Fetch SSH key from Secret Manager
        id: ssh
        run: |
          gcloud secrets versions access latest \
            --secret="hetzner-testnet-ssh-key" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # Mask every line of the key so it never appears in logs
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done < /tmp/deploy_key
          echo "key<<SSHEOF" >> "$GITHUB_OUTPUT"
          cat /tmp/deploy_key >> "$GITHUB_OUTPUT"
          echo "SSHEOF" >> "$GITHUB_OUTPUT"
          rm -f /tmp/deploy_key

      - name: Prepare upload directory
        working-directory: indexers/substreams
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/spkg-upload
          cp onsocial-events-${VER}-*.spkg $GITHUB_WORKSPACE/spkg-upload/
          cp *_schema.sql $GITHUB_WORKSPACE/spkg-upload/
          echo "Upload contents:"
          ls -la $GITHUB_WORKSPACE/spkg-upload/

      - name: Upload spkgs and schemas
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 135.181.110.183
          username: root
          key: ${{ steps.ssh.outputs.key }}
          source: spkg-upload/*
          target: /tmp/onsocial-spkg-upload/
          strip_components: 1
          overwrite: true

      # Step 2: Stop sinks, swap spkgs, restart, health-check with rollback
      - name: Deploy and restart sinks
        uses: appleboy/ssh-action@v1
        env:
          VER: ${{ steps.ver.outputs.version }}
          CLEAN_DEPLOY: ${{ inputs.clean_deploy || 'false' }}
        with:
          host: 135.181.110.183
          username: root
          key: ${{ steps.ssh.outputs.key }}
          envs: VER,CLEAN_DEPLOY
          command_timeout: 10m
          script: |
            set -euo pipefail
            SPKG_DIR=/root/onsocial-indexer
            UPLOAD_DIR=/tmp/onsocial-spkg-upload

            echo "=== Substreams deploy: ${{ steps.sha.outputs.short }} (${VER}) ==="

            # Discover contract variants dynamically from uploaded spkg filenames
            CONTRACTS=()
            for f in ${UPLOAD_DIR}/onsocial-events-${VER}-*.spkg; do
              [ -f "$f" ] || continue
              variant=$(basename "$f" .spkg | sed "s/onsocial-events-${VER}-//")
              CONTRACTS+=("$variant")
            done
            if [ ${#CONTRACTS[@]} -eq 0 ]; then
              echo "❌ No spkg files found in ${UPLOAD_DIR}"
              exit 1
            fi
            echo "✓ Discovered ${#CONTRACTS[@]} contracts: ${CONTRACTS[*]}"

            # Build space-separated service names for systemctl
            SERVICES=""
            for c in "${CONTRACTS[@]}"; do SERVICES+=" onsocial-sink-$c"; done

            # Read DB_URL once for all operations
            # Priority: file > env > extract from existing working unit
            DB_URL=""
            if [ -f /root/.onsocial-sink-db-url ]; then
              DB_URL=$(cat /root/.onsocial-sink-db-url)
            elif [ -n "${DATABASE_URL:-}" ]; then
              DB_URL="$DATABASE_URL"
            else
              # Fallback: extract from an existing working systemd unit
              # DB_URL is on the line AFTER "substreams-sink-sql run \"
              for existing_unit in /etc/systemd/system/onsocial-sink-*.service; do
                [ -f "$existing_unit" ] || continue
                EXTRACTED=$(grep -A1 'substreams-sink-sql run' "$existing_unit" \
                  | tail -1 | awk '{$1=$1; print $1}' | sed 's/\\$//')
                if [ -n "$EXTRACTED" ] && [[ "$EXTRACTED" == postgres* ]]; then
                  DB_URL="$EXTRACTED"
                  echo "📝 Extracted DB_URL from $(basename $existing_unit)"
                  break
                fi
              done
            fi
            if [ -z "$DB_URL" ]; then
              echo "❌ No DB_URL found (checked /root/.onsocial-sink-db-url, \$DATABASE_URL, existing units)"
              echo "   Create /root/.onsocial-sink-db-url with the Postgres connection string"
              exit 1
            fi
            ENDPOINT="${SUBSTREAMS_ENDPOINT:-near-testnet.streamingfast.io:443}"

            # Stop sinks (ignore errors for services that don't exist yet)
            systemctl stop $SERVICES 2>/dev/null || true
            echo "✓ Sinks stopped"

            # Track which contracts are brand-new (no prior systemd unit)
            NEW_CONTRACTS=()
            for variant in "${CONTRACTS[@]}"; do
              [ ! -f "/etc/systemd/system/onsocial-sink-${variant}.service" ] && NEW_CONTRACTS+=("$variant")
            done

            # Clean deploy: drop all tables and re-apply schema
            if [ "$CLEAN_DEPLOY" = "true" ]; then
              echo "🧹 Clean deploy requested — dropping tables and cursors"
              psql "$DB_URL" -c "
                DO \$\$ DECLARE t TEXT;
                BEGIN
                  FOR t IN SELECT tablename FROM pg_tables
                    WHERE schemaname = 'public' AND tablename != 'schema_migrations'
                  LOOP EXECUTE 'DROP TABLE IF EXISTS ' || t || ' CASCADE'; END LOOP;
                END \$\$;
              "
              echo "✓ Tables dropped"
              for variant in "${CONTRACTS[@]}"; do
                SCHEMA_FILE="${UPLOAD_DIR}/${variant}_schema.sql"
                if [ -f "$SCHEMA_FILE" ]; then
                  psql "$DB_URL" -f "$SCHEMA_FILE"
                  echo "✓ Applied ${variant}_schema.sql"
                fi
              done
            else
              # Incremental deploy: apply schemas only for NEW contracts
              for variant in "${CONTRACTS[@]}"; do
                SCHEMA_FILE="${UPLOAD_DIR}/${variant}_schema.sql"
                [ -f "$SCHEMA_FILE" ] || continue
                if [ "$variant" = "core" ]; then
                  TABLE_NAME="data_updates"
                else
                  TABLE_NAME="${variant}_events"
                fi
                EXISTS=$(psql "$DB_URL" -tAc \
                  "SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='${TABLE_NAME}'" 2>/dev/null || true)
                if [ "$EXISTS" != "1" ]; then
                  echo "📝 New contract detected: ${variant} — applying schema"
                  psql "$DB_URL" -f "$SCHEMA_FILE"
                  echo "✓ Applied ${variant}_schema.sql"
                fi
              done
            fi

            # Remove old versioned spkgs (different version)
            find "$SPKG_DIR" -name 'onsocial-events-v*-*.spkg' ! -name "*-${VER}-*" -delete 2>/dev/null || true

            # Backup current spkgs
            for variant in "${CONTRACTS[@]}"; do
              CURRENT="${SPKG_DIR}/onsocial-events-${VER}-${variant}.spkg"
              [ -f "$CURRENT" ] && cp "$CURRENT" "${CURRENT}.prev"
            done

            # Move uploaded spkgs + schemas into place
            for variant in "${CONTRACTS[@]}"; do
              mv "${UPLOAD_DIR}/onsocial-events-${VER}-${variant}.spkg" \
                 "${SPKG_DIR}/onsocial-events-${VER}-${variant}.spkg"
            done
            cp "${UPLOAD_DIR}"/*_schema.sql "${SPKG_DIR}/" 2>/dev/null || true
            rm -rf "$UPLOAD_DIR"
            echo "✓ Spkgs swapped"

            # For brand-new contracts: run substreams-sink-sql setup to
            # register cursor + create schema tables before first run
            if [ ${#NEW_CONTRACTS[@]} -gt 0 ] && [ -n "$DB_URL" ]; then
              echo "📝 Running sink setup for new contracts: ${NEW_CONTRACTS[*]}"
              for variant in "${NEW_CONTRACTS[@]}"; do
                SPKG="${SPKG_DIR}/onsocial-events-${VER}-${variant}.spkg"
                echo "  Setting up ${variant}..."
                substreams-sink-sql setup "$DB_URL" "$SPKG" 2>&1 || {
                  echo "  ⚠️  setup returned non-zero for ${variant} (may already exist — continuing)"
                }
              done
              echo "✓ Sink setup complete"
            fi

            # Create or update systemd service files
            for variant in "${CONTRACTS[@]}"; do
              UNIT="/etc/systemd/system/onsocial-sink-${variant}.service"
              if [ -f "$UNIT" ]; then
                sed -i "s|onsocial-events-v[0-9.]*-${variant}.spkg|onsocial-events-${VER}-${variant}.spkg|g" "$UNIT"
              else
                echo "📝 Creating new systemd unit: onsocial-sink-${variant}"
                cat > "$UNIT" <<UNITEOF
            [Unit]
            Description=OnSocial Substreams Sink - ${variant}
            After=network.target postgresql.service

            [Service]
            Type=simple
            Environment=SUBSTREAMS_API_TOKEN=
            ExecStart=/usr/local/bin/substreams-sink-sql run \
              ${DB_URL} \
              ${SPKG_DIR}/onsocial-events-${VER}-${variant}.spkg \
              -e ${ENDPOINT} \
              -p map_${variant}_output=contract_id=${variant}.onsocial.testnet \
              --infinite-retry
            Restart=on-failure
            RestartSec=15

            [Install]
            WantedBy=multi-user.target
            UNITEOF
                systemctl enable "onsocial-sink-${variant}" 2>/dev/null || true
              fi
            done
            systemctl daemon-reload
            echo "✓ Systemd units updated to ${VER}"

            # Restart sinks
            systemctl start $SERVICES
            echo "✓ Sinks started"

            # Health check — poll every 10s for up to 90s
            POLL_INTERVAL=10
            MAX_WAIT=90
            ELAPSED=0
            TOTAL=${#CONTRACTS[@]}

            while [ $ELAPSED -lt $MAX_WAIT ]; do
              sleep $POLL_INTERVAL
              ELAPSED=$((ELAPSED + POLL_INTERVAL))
              ACTIVE=0
              for s in "${CONTRACTS[@]}"; do
                systemctl is-active --quiet "onsocial-sink-$s" && ACTIVE=$((ACTIVE + 1))
              done
              echo "  ⏱ ${ELAPSED}s: ${ACTIVE}/${TOTAL} sinks active"
              [ "$ACTIVE" -eq "$TOTAL" ] && break
            done

            # Final status report
            echo ""
            ACTIVE=0
            FAILED_SINKS=()
            for s in "${CONTRACTS[@]}"; do
              if systemctl is-active --quiet "onsocial-sink-$s"; then
                ACTIVE=$((ACTIVE + 1))
                echo "  ✅ $s: active"
              else
                STATE=$(systemctl is-active "onsocial-sink-$s" 2>/dev/null || echo "unknown")
                echo "  ❌ $s: $STATE"
                FAILED_SINKS+=("$s")
              fi
            done

            # Dump journal logs for any failed sinks (last 30 lines each)
            if [ ${#FAILED_SINKS[@]} -gt 0 ]; then
              echo ""
              echo "=== Failed sink logs ==="
              for s in "${FAILED_SINKS[@]}"; do
                echo "--- onsocial-sink-$s ---"
                journalctl -u "onsocial-sink-$s" --no-pager -n 30 2>/dev/null || true
                echo ""
              done
            fi

            if [ "$ACTIVE" -lt "$TOTAL" ]; then
              echo ""
              echo "❌ Only $ACTIVE/$TOTAL sinks active after ${MAX_WAIT}s — rolling back"
              for variant in "${CONTRACTS[@]}"; do
                PREV="${SPKG_DIR}/onsocial-events-${VER}-${variant}.spkg.prev"
                [ -f "$PREV" ] && mv "$PREV" "${SPKG_DIR}/onsocial-events-${VER}-${variant}.spkg"
              done
              systemctl restart $SERVICES || true
              exit 1
            fi

            # Cleanup backups on success
            rm -f ${SPKG_DIR}/*.spkg.prev

            echo ""
            echo "✅ Deploy complete — $ACTIVE/$TOTAL sinks active (${VER} @ ${{ steps.sha.outputs.short }})"
