name: Deploy Substreams (Testnet)

on:
  push:
    branches: [main]
    paths:
      - 'indexers/substreams/**'
      - '.github/workflows/deploy-substreams-testnet.yml'
  workflow_run:
    workflows: ["Substreams CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      clean_deploy:
        description: "Drop all tables and re-index from scratch"
        type: boolean
        default: false
      deploy_host:
        description: "Optional override for testnet data host/IP"
        required: false
      ssh_secret_name:
        description: "GSM secret name for the testnet host SSH key"
        required: true
        default: "hetzner-testnet-ssh-key"
      db_secret_name:
        description: "GSM secret name for the testnet Substreams DB URL"
        required: true
        default: "substreams-testnet-db-url"
      api_token_secret_name:
        description: "GSM secret name for the Substreams API token"
        required: true
        default: "SUBSTREAMS_API_TOKEN"
      hasura_admin_secret_name:
        description: "GSM secret name for the Hasura admin secret"
        required: true
        default: "HASURA_ADMIN_SECRET"
      substreams_endpoint:
        description: "Substreams endpoint override"
        required: false
        default: "testnet.near.streamingfast.io:443"

env:
  TESTNET_SUBSTREAMS_DEPLOY_HOST: ${{ inputs.deploy_host != '' && inputs.deploy_host || vars.TESTNET_DATA_DEPLOY_HOST != '' && vars.TESTNET_DATA_DEPLOY_HOST || '135.181.110.183' }}
  TESTNET_SUBSTREAMS_ENDPOINT: ${{ inputs.substreams_endpoint != '' && inputs.substreams_endpoint || 'testnet.near.streamingfast.io:443' }}

concurrency:
  group: hasura-testnet
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  validate:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Check host configuration
        run: |
          if [ -z "${{ env.TESTNET_SUBSTREAMS_DEPLOY_HOST }}" ]; then
            echo "❌ TESTNET_SUBSTREAMS_DEPLOY_HOST is not set. Provide deploy_host or configure TESTNET_DATA_DEPLOY_HOST."
            exit 1
          fi
          echo "✅ Testnet substreams host resolved"

  deploy:
    name: Deploy spkg to Hetzner
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: testnet
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: indexers/substreams -> target

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Extract version from substreams.yaml
        id: ver
        working-directory: indexers/substreams
        run: |
          VER=$(grep -m1 'version:' substreams.yaml | awk '{print $2}')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VER"

      - name: Build WASM
        working-directory: indexers/substreams
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install substreams CLI
        run: |
          curl -sL https://github.com/streamingfast/substreams/releases/latest/download/substreams_linux_x86_64.tar.gz | tar xz -C /usr/local/bin
          substreams --version

      - name: Pack all spkgs
        working-directory: indexers/substreams
        run: ./pack.sh

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Step 1: Upload spkgs + schema to server staging directory
      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/87856119115/locations/global/workloadIdentityPools/github-ci/providers/github-oidc"
          service_account: "github-ci-deploy@onsocial-protocol.iam.gserviceaccount.com"

      - name: Fetch SSH key from Secret Manager
        id: ssh
        run: |
          gcloud secrets versions access latest \
            --secret="${{ inputs.ssh_secret_name || 'hetzner-testnet-ssh-key' }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # Mask every line of the key so it never appears in logs
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done < /tmp/deploy_key
          echo "key<<SSHEOF" >> "$GITHUB_OUTPUT"
          cat /tmp/deploy_key >> "$GITHUB_OUTPUT"
          echo "SSHEOF" >> "$GITHUB_OUTPUT"
          rm -f /tmp/deploy_key

      - name: Fetch Substreams DB URL from Secret Manager
        id: db
        run: |
          DB_URL=$(gcloud secrets versions access latest \
            --secret="${{ inputs.db_secret_name || 'substreams-testnet-db-url' }}")
          echo "::add-mask::$DB_URL"
          echo "url=$DB_URL" >> "$GITHUB_OUTPUT"

      - name: Fetch Substreams API Token from Secret Manager
        id: sf_token
        run: |
          TOKEN=$(gcloud secrets versions access latest \
            --secret="${{ inputs.api_token_secret_name || 'SUBSTREAMS_API_TOKEN' }}")
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Fetch Hasura admin secret from Secret Manager
        id: hasura_secret
        run: |
          SECRET=$(gcloud secrets versions access latest \
            --secret="${{ inputs.hasura_admin_secret_name || 'HASURA_ADMIN_SECRET' }}")
          echo "::add-mask::$SECRET"
          echo "secret=$SECRET" >> "$GITHUB_OUTPUT"

      - name: Prepare upload directory
        working-directory: indexers/substreams
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/spkg-upload
          cp onsocial-events-${VER}-combined.spkg $GITHUB_WORKSPACE/spkg-upload/
          find . -maxdepth 1 -type f -name '*.sql' -exec cp {} $GITHUB_WORKSPACE/spkg-upload/ \;
          cp scripts/sync-hasura-substreams-metadata.sh $GITHUB_WORKSPACE/spkg-upload/
          echo "Upload contents:"
          ls -la $GITHUB_WORKSPACE/spkg-upload/

      - name: Upload spkg and schema
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.TESTNET_SUBSTREAMS_DEPLOY_HOST }}
          username: root
          key: ${{ steps.ssh.outputs.key }}
          source: spkg-upload/*
          target: /tmp/onsocial-spkg-upload/
          strip_components: 1
          overwrite: true

      # Step 2: Deploy single combined sink — 1 stream for all 5 contracts
      - name: Deploy and restart sink
        uses: appleboy/ssh-action@v1
        env:
          VER: ${{ steps.ver.outputs.version }}
          CLEAN_DEPLOY: ${{ inputs.clean_deploy || 'false' }}
          SUBSTREAMS_DB_URL: ${{ steps.db.outputs.url }}
          SUBSTREAMS_API_TOKEN: ${{ steps.sf_token.outputs.token }}
          HASURA_ADMIN_SECRET: ${{ steps.hasura_secret.outputs.secret }}
        with:
          host: ${{ env.TESTNET_SUBSTREAMS_DEPLOY_HOST }}
          username: root
          key: ${{ steps.ssh.outputs.key }}
          envs: VER,CLEAN_DEPLOY,SUBSTREAMS_DB_URL,SUBSTREAMS_API_TOKEN,HASURA_ADMIN_SECRET
          command_timeout: 10m
          script: |
            set -euo pipefail
            SPKG_DIR=/root/onsocial-indexer
            UPLOAD_DIR=/tmp/onsocial-spkg-upload
            SERVICE="onsocial-sink-combined"
            SPKG_NAME="onsocial-events-${VER}-combined.spkg"
            NETWORK_SUFFIX="testnet"
            HASURA_URL="http://127.0.0.1:8080/v1/graphql"

            echo "=== Substreams deploy: ${{ steps.sha.outputs.short }} (${VER}) ==="
            echo "Mode: single combined stream (1 sink for all contracts)"

            # DB_URL from Google Secret Manager (passed via SUBSTREAMS_DB_URL env)
            DB_URL="${SUBSTREAMS_DB_URL:-}"
            if [ -z "$DB_URL" ]; then
              echo "❌ No DB_URL — ensure 'substreams-testnet-db-url' secret exists in GCP Secret Manager"
              exit 1
            fi
            ENDPOINT="${SUBSTREAMS_ENDPOINT:-${{ env.TESTNET_SUBSTREAMS_ENDPOINT }}}"

            # Stop existing sinks (combined + any legacy per-contract sinks)
            systemctl stop $SERVICE 2>/dev/null || true
            for legacy in onsocial-sink-core onsocial-sink-boost onsocial-sink-rewards onsocial-sink-token onsocial-sink-scarces; do
              systemctl stop "$legacy" 2>/dev/null || true
              systemctl disable "$legacy" 2>/dev/null || true
            done
            echo "✓ Sinks stopped"

            # Helper: psql via Docker container (client not installed on host)
            PSQL="docker exec -i postgres psql -U onsocial -d onsocial_indexer"

            # Legacy schema migration: early deployments only had core/token tables,
            # and later core schema revisions added columns without ALTER migrations.
            # Bring those tables up to the current shape before applying indexes.
            $PSQL <<'SQLEOF'
            -- boost_events: version columns were INTEGER, contract emits semver strings
            ALTER TABLE IF EXISTS boost_events
              ALTER COLUMN old_version TYPE TEXT USING old_version::TEXT,
              ALTER COLUMN new_version TYPE TEXT USING new_version::TEXT;

            ALTER TABLE IF EXISTS data_updates
              ADD COLUMN IF NOT EXISTS extra_data TEXT,
              ADD COLUMN IF NOT EXISTS reaction_kind TEXT,
              ADD COLUMN IF NOT EXISTS channel TEXT,
              ADD COLUMN IF NOT EXISTS kind TEXT,
              ADD COLUMN IF NOT EXISTS audiences TEXT;

            ALTER TABLE IF EXISTS storage_updates
              ADD COLUMN IF NOT EXISTS available_balance TEXT,
              ADD COLUMN IF NOT EXISTS previous_pool_balance TEXT,
              ADD COLUMN IF NOT EXISTS new_pool_balance TEXT,
              ADD COLUMN IF NOT EXISTS bytes TEXT,
              ADD COLUMN IF NOT EXISTS remaining_allowance TEXT,
              ADD COLUMN IF NOT EXISTS pool_account TEXT,
              ADD COLUMN IF NOT EXISTS max_bytes TEXT,
              ADD COLUMN IF NOT EXISTS new_shared_bytes TEXT,
              ADD COLUMN IF NOT EXISTS new_used_bytes TEXT,
              ADD COLUMN IF NOT EXISTS pool_available_bytes TEXT,
              ADD COLUMN IF NOT EXISTS used_bytes TEXT;

            ALTER TABLE IF EXISTS group_updates
              ADD COLUMN IF NOT EXISTS member_nonce BIGINT,
              ADD COLUMN IF NOT EXISTS member_nonce_path TEXT,
              ADD COLUMN IF NOT EXISTS pool_key TEXT,
              ADD COLUMN IF NOT EXISTS amount TEXT,
              ADD COLUMN IF NOT EXISTS previous_pool_balance TEXT,
              ADD COLUMN IF NOT EXISTS new_pool_balance TEXT,
              ADD COLUMN IF NOT EXISTS quota_bytes TEXT,
              ADD COLUMN IF NOT EXISTS quota_used TEXT,
              ADD COLUMN IF NOT EXISTS daily_limit TEXT,
              ADD COLUMN IF NOT EXISTS previously_enabled BOOLEAN,
              ADD COLUMN IF NOT EXISTS sequence_number BIGINT,
              ADD COLUMN IF NOT EXISTS title TEXT,
              ADD COLUMN IF NOT EXISTS auto_vote BOOLEAN,
              ADD COLUMN IF NOT EXISTS created_at BIGINT,
              ADD COLUMN IF NOT EXISTS locked_member_count INTEGER,
              ADD COLUMN IF NOT EXISTS locked_deposit TEXT,
              ADD COLUMN IF NOT EXISTS expires_at BIGINT,
              ADD COLUMN IF NOT EXISTS tally_path TEXT,
              ADD COLUMN IF NOT EXISTS counter_path TEXT,
              ADD COLUMN IF NOT EXISTS should_execute BOOLEAN,
              ADD COLUMN IF NOT EXISTS should_reject BOOLEAN,
              ADD COLUMN IF NOT EXISTS voted_at BIGINT,
              ADD COLUMN IF NOT EXISTS voting_period BIGINT,
              ADD COLUMN IF NOT EXISTS participation_quorum INTEGER,
              ADD COLUMN IF NOT EXISTS approval_threshold INTEGER,
              ADD COLUMN IF NOT EXISTS permission_key TEXT,
              ADD COLUMN IF NOT EXISTS permission_value TEXT,
              ADD COLUMN IF NOT EXISTS permission_target TEXT,
              ADD COLUMN IF NOT EXISTS name TEXT,
              ADD COLUMN IF NOT EXISTS is_public BOOLEAN,
              ADD COLUMN IF NOT EXISTS creator_role TEXT,
              ADD COLUMN IF NOT EXISTS storage_allocation TEXT;
            SQLEOF

            # Schema: clean deploy drops everything; otherwise always apply the
            # current combined schema so new contract tables/indexes are present.
            if [ "$CLEAN_DEPLOY" = "true" ]; then
              echo "🧹 Clean deploy — dropping all tables"
              $PSQL -c "
                DO \$\$ DECLARE t TEXT;
                BEGIN
                  FOR t IN SELECT tablename FROM pg_tables
                    WHERE schemaname = 'public' AND tablename != 'schema_migrations'
                  LOOP EXECUTE 'DROP TABLE IF EXISTS ' || t || ' CASCADE'; END LOOP;
                END \$\$;
              "
              echo "✓ Tables dropped"
            fi

            echo "📝 Applying combined schema"
            $PSQL < "${UPLOAD_DIR}/combined_schema.sql"
            echo "✓ Combined schema applied"

            # Rebuild all managed derived views so definition changes in the SQL
            # files are actually applied on deploy. The view files use
            # CREATE MATERIALIZED VIEW IF NOT EXISTS, so re-applying without
            # dropping would silently keep stale definitions.
            echo "🧹 Rebuilding core and leaderboard materialized views"
            $PSQL <<'SQLEOF'
            DO $$ DECLARE mv TEXT;
            BEGIN
              FOR mv IN SELECT matviewname FROM pg_matviews WHERE schemaname = 'public'
              LOOP
                EXECUTE 'DROP MATERIALIZED VIEW IF EXISTS ' || quote_ident(mv) || ' CASCADE';
              END LOOP;
            END $$;
            SQLEOF
            echo "✓ Derived views dropped"

            shopt -s nullglob
            VIEW_FILES=("${UPLOAD_DIR}"/*_schema_views.sql)
            if [ ${#VIEW_FILES[@]} -gt 0 ]; then
              printf '%s\n' "${VIEW_FILES[@]}" | sort | while read -r view_sql; do
                echo "📝 Applying $(basename "$view_sql")"
                $PSQL < "$view_sql"
              done
              echo "✓ Schema view files applied"
            else
              echo "ℹ️ No *_schema_views.sql files found to apply"
            fi

            # Swap spkg
            [ -f "${SPKG_DIR}/${SPKG_NAME}" ] && cp "${SPKG_DIR}/${SPKG_NAME}" "${SPKG_DIR}/${SPKG_NAME}.prev"
            mv "${UPLOAD_DIR}/${SPKG_NAME}" "${SPKG_DIR}/${SPKG_NAME}"
            cp "${UPLOAD_DIR}"/*.sql "${SPKG_DIR}/" 2>/dev/null || true
            cp "${UPLOAD_DIR}"/*.sh "${SPKG_DIR}/" 2>/dev/null || true
            rm -rf "$UPLOAD_DIR"
            echo "✓ Spkg swapped"

            # Cursor handling:
            # - clean deploy: drop cursors and re-index from scratch
            # - incremental deploy: keep existing combined-sink cursors so we do
            #   not replay historical blocks into existing tables and hit
            #   duplicate primary-key errors on deterministic row IDs.
            #   Only drop if the table shape looks stale/incompatible.
            if [ "$CLEAN_DEPLOY" = "true" ]; then
              echo "🧹 Clean deploy — dropping cursors"
              $PSQL -c "DROP TABLE IF EXISTS cursors" 2>/dev/null || true
            else
              CURSOR_COLUMNS=$($PSQL -tAc "
                SELECT COALESCE(string_agg(column_name, ',' ORDER BY ordinal_position), '')
                FROM information_schema.columns
                WHERE table_schema = 'public' AND table_name = 'cursors'
              " 2>/dev/null | tr -d '[:space:]' || true)

              if [ -z "$CURSOR_COLUMNS" ]; then
                echo "ℹ️ No existing cursors table — sink will initialize a new one"
              elif [[ "$CURSOR_COLUMNS" != *id* || "$CURSOR_COLUMNS" != *block_num* || "$CURSOR_COLUMNS" != *cursor* ]]; then
                echo "⚠️ Incompatible cursors table detected (${CURSOR_COLUMNS}) — dropping it"
                $PSQL -c "DROP TABLE IF EXISTS cursors" 2>/dev/null || true
              else
                echo "✓ Keeping existing cursors table for incremental deploy"
              fi
            fi

            # Run sink setup (creates cursors table, validates schema)
            echo "📝 Running sink setup..."
            substreams-sink-sql setup "$DB_URL" "${SPKG_DIR}/${SPKG_NAME}" 2>&1 || {
              echo "  ⚠️ setup returned non-zero (may already exist — continuing)"
            }
            echo "✓ Sink setup complete"

            # Consistency check: if cursors table has no valid progress (max
            # block_num is 0 or NULL) but data tables already contain rows, the
            # sink would replay from the initial start block and hit duplicate-
            # key errors on deterministic row IDs.  Truncate stale data so the
            # sink can replay cleanly.
            MAX_CURSOR_BLOCK=$($PSQL -tAc \
              "SELECT COALESCE(MAX(block_num), 0) FROM cursors" 2>/dev/null \
              | tr -d '[:space:]' || echo "0")
            if [ "$MAX_CURSOR_BLOCK" = "0" ]; then
              DATA_ROW_COUNT=$($PSQL -tAc \
                "SELECT COALESCE(SUM(n_live_tup), 0)::bigint FROM pg_stat_user_tables
                 WHERE relname NOT IN ('cursors', 'schema_migrations')" 2>/dev/null \
                | tr -d '[:space:]' || echo "0")
              if [ "$DATA_ROW_COUNT" != "0" ] && [ "$DATA_ROW_COUNT" != "" ]; then
                echo "⚠️ No valid cursor (block_num=$MAX_CURSOR_BLOCK) but data tables hold ~$DATA_ROW_COUNT rows"
                echo "   Truncating data tables to avoid duplicate-key errors on replay..."
                $PSQL <<'SQLEOF'
            DO $$ DECLARE t TEXT;
            BEGIN
              FOR t IN SELECT tablename FROM pg_tables
                WHERE schemaname = 'public'
                  AND tablename NOT IN ('cursors', 'schema_migrations')
              LOOP
                EXECUTE 'TRUNCATE TABLE ' || quote_ident(t) || ' CASCADE';
              END LOOP;
            END $$;
            SQLEOF
                echo "✓ Data tables truncated — sink will re-index from start block"
              fi
            fi

            # Build the combined params string
            PARAMS="core=core.onsocial.${NETWORK_SUFFIX}&boost=boost.onsocial.${NETWORK_SUFFIX}&rewards=rewards.onsocial.${NETWORK_SUFFIX}&token=token.onsocial.${NETWORK_SUFFIX}&scarces=scarces.onsocial.${NETWORK_SUFFIX}"

            # Write sink secrets/config to root-only credential source files.
            install -d -m 700 /etc/onsocial/credentials/${SERVICE}
            printf '%s' "${DB_URL}" > /etc/onsocial/credentials/${SERVICE}/db_url
            printf '%s' "${SUBSTREAMS_API_TOKEN}" > /etc/onsocial/credentials/${SERVICE}/api_token
            printf '%s' "${ENDPOINT}" > /etc/onsocial/credentials/${SERVICE}/endpoint
            printf '%s' "${PARAMS}" > /etc/onsocial/credentials/${SERVICE}/params
            printf '%s' "${SPKG_DIR}/${SPKG_NAME}" > /etc/onsocial/credentials/${SERVICE}/spkg
            chmod 600 /etc/onsocial/credentials/${SERVICE}/*

            # Create or update systemd unit
            UNIT="/etc/systemd/system/${SERVICE}.service"
            cat > "$UNIT" <<UNITEOF
            [Unit]
            Description=OnSocial Substreams Combined Sink
            After=network.target postgresql.service

            [Service]
            Type=simple
            LoadCredential=db_url:/etc/onsocial/credentials/${SERVICE}/db_url
            LoadCredential=api_token:/etc/onsocial/credentials/${SERVICE}/api_token
            LoadCredential=endpoint:/etc/onsocial/credentials/${SERVICE}/endpoint
            LoadCredential=params:/etc/onsocial/credentials/${SERVICE}/params
            LoadCredential=spkg:/etc/onsocial/credentials/${SERVICE}/spkg
            ExecStart=/bin/bash -lc 'export SUBSTREAMS_API_TOKEN="\$(cat "\${CREDENTIALS_DIRECTORY}/api_token")"; exec /usr/local/bin/substreams-sink-sql run "\$(cat "\${CREDENTIALS_DIRECTORY}/db_url")" "\$(cat "\${CREDENTIALS_DIRECTORY}/spkg")" -e "\$(cat "\${CREDENTIALS_DIRECTORY}/endpoint")" -p "map_combined_output=\$(cat "\${CREDENTIALS_DIRECTORY}/params")" --on-module-hash-mistmatch warn --infinite-retry'
            Restart=on-failure
            RestartSec=15

            [Install]
            WantedBy=multi-user.target
            UNITEOF
            systemctl daemon-reload
            systemctl enable "$SERVICE" 2>/dev/null || true
            echo "✓ Systemd unit updated"

            UNIT_ENV=$(systemctl show "$SERVICE" --property=Environment --value 2>/dev/null || true)
            if [ -n "$UNIT_ENV" ]; then
              echo "❌ Systemd unit still has Environment entries; expected credentials-only configuration"
              exit 1
            fi
            echo "✓ Systemd unit does not expose runtime environment secrets"

            # Start sink
            systemctl start "$SERVICE"
            echo "✓ Sink started"

            # Health check — poll every 10s for up to 60s
            POLL_INTERVAL=10
            MAX_WAIT=60
            ELAPSED=0
            while [ $ELAPSED -lt $MAX_WAIT ]; do
              sleep $POLL_INTERVAL
              ELAPSED=$((ELAPSED + POLL_INTERVAL))
              if systemctl is-active --quiet "$SERVICE"; then
                echo "  ✅ Combined sink active after ${ELAPSED}s"
                break
              fi
              echo "  ⏱ ${ELAPSED}s: waiting..."
            done

            if ! systemctl is-active --quiet "$SERVICE"; then
              echo ""
              echo "=== Sink logs ==="
              journalctl -u "$SERVICE" --no-pager -n 50 2>/dev/null || true
              echo ""
              echo "❌ Combined sink not active after ${MAX_WAIT}s — rolling back"
              PREV="${SPKG_DIR}/${SPKG_NAME}.prev"
              [ -f "$PREV" ] && mv "$PREV" "${SPKG_DIR}/${SPKG_NAME}"
              systemctl restart "$SERVICE" || true
              exit 1
            fi

            # Post-deploy smoke test: verify sink system tables and contract tables.
            echo "🧪 Running post-deploy smoke test..."
            CURSOR_WAIT=0
            CURSOR_MAX_WAIT=120
            while [ $CURSOR_WAIT -lt $CURSOR_MAX_WAIT ]; do
              CURSOR_COUNT=$($PSQL -tAc "SELECT COUNT(*) FROM cursors" 2>/dev/null | tr -d '[:space:]' || true)
              CURSOR_BLOCK_NUM=$($PSQL -tAc "SELECT COALESCE(MAX(block_num), 0) FROM cursors" 2>/dev/null | tr -d '[:space:]' || true)
              if [ -n "$CURSOR_COUNT" ] && [ "$CURSOR_COUNT" != "0" ] && [ -n "$CURSOR_BLOCK_NUM" ] && [ "$CURSOR_BLOCK_NUM" != "0" ]; then
                echo "  ✅ cursors rows present: $CURSOR_COUNT"
                echo "  ✅ cursor block advanced: $CURSOR_BLOCK_NUM"
                break
              fi
              sleep 5
              CURSOR_WAIT=$((CURSOR_WAIT + 5))
              echo "  ⏱ waiting for cursor progress... ${CURSOR_WAIT}s (rows=${CURSOR_COUNT:-0}, block=${CURSOR_BLOCK_NUM:-0})"
            done

            if [ -z "${CURSOR_COUNT:-}" ] || [ "$CURSOR_COUNT" = "0" ] || [ -z "${CURSOR_BLOCK_NUM:-}" ] || [ "$CURSOR_BLOCK_NUM" = "0" ]; then
              echo "❌ Smoke test failed: cursor did not advance beyond block 0"
              journalctl -u "$SERVICE" --no-pager -n 50 2>/dev/null || true
              exit 1
            fi

            echo "🧩 Syncing Hasura metadata for public substreams relations..."
            HASURA_URL="$HASURA_URL" \
            HASURA_ADMIN_SECRET="$HASURA_ADMIN_SECRET" \
            bash "${SPKG_DIR}/sync-hasura-substreams-metadata.sh" "${SPKG_DIR}"
            echo "✓ Hasura metadata synced"

            # New substreams relations are tracked here, but they remain invisible
            # to gateway API clients until the gateway re-applies Hasura select
            # permissions for the api_user tiers. The app deploy also does this,
            # but it may run before substreams finishes creating/tracking new
            # relations. Re-run it here to close that ordering gap.
            if [ -d /opt/onsocial ] && [ -f /opt/onsocial/docker-compose.yml ]; then
              echo "🔐 Syncing gateway Hasura permissions after substreams metadata update..."
              (
                cd /opt/onsocial
                # Suppress "VAR is not set" docker-compose warnings — `exec`
                # only needs to attach to the already-running container, but
                # docker-compose still parses the entire compose file and
                # warns about every variable referenced in it. Source .env
                # if present so those references resolve to real values.
                if [ -f .env ]; then
                  set -a
                  # shellcheck disable=SC1091
                  . ./.env
                  set +a
                fi
                if docker compose ps gateway >/dev/null 2>&1; then
                  mkdir -p /opt/onsocial/backups
                  docker compose exec -T -e HASURA_BACKUP_DIR=/tmp gateway \
                    node packages/onsocial-gateway/dist/scripts/apply-hasura-permissions.js sync
                  LATEST_SNAPSHOT=$(docker compose exec -T gateway sh -c 'ls -1t /tmp/hasura-metadata-*.json 2>/dev/null | head -1' | tr -d '\r')
                  if [ -n "$LATEST_SNAPSHOT" ]; then
                    docker cp "gateway:$LATEST_SNAPSHOT" /opt/onsocial/backups/ 2>/dev/null || true
                  fi
                  echo "✓ Gateway Hasura permissions synced + smoke tested"
                else
                  echo "⚠️ Gateway service not found in /opt/onsocial docker compose; skipping permission sync"
                fi
              )
            else
              echo "⚠️ /opt/onsocial docker compose stack not found; skipping gateway Hasura permission sync"
            fi

            MISSING_TABLES=$($PSQL -tAc "
              SELECT string_agg(name, ',')
              FROM (
                SELECT 'data_updates' AS name
                UNION ALL SELECT 'boost_events'
                UNION ALL SELECT 'rewards_events'
                UNION ALL SELECT 'token_events'
                UNION ALL SELECT 'scarces_events'
              ) expected
              WHERE NOT EXISTS (
                SELECT 1
                FROM information_schema.tables
                WHERE table_schema = 'public' AND table_name = expected.name
              )
            " 2>/dev/null | tr -d '[:space:]' || true)

            if [ -n "$MISSING_TABLES" ]; then
              echo "❌ Smoke test failed: missing tables: $MISSING_TABLES"
              exit 1
            fi

            echo "✓ Smoke test passed"

            # Cleanup
            rm -f "${SPKG_DIR}/${SPKG_NAME}.prev"
            # Remove old per-contract spkgs
            find "$SPKG_DIR" -name 'onsocial-events-v*-core.spkg' -o \
              -name 'onsocial-events-v*-boost.spkg' -o \
              -name 'onsocial-events-v*-rewards.spkg' -o \
              -name 'onsocial-events-v*-token.spkg' -o \
              -name 'onsocial-events-v*-scarces.spkg' | xargs rm -f 2>/dev/null || true

            echo ""
            echo "✅ Deploy complete — combined sink active (${VER} @ ${{ steps.sha.outputs.short }})"
