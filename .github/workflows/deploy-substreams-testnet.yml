name: Deploy Substreams (Testnet)

on:
  workflow_run:
    workflows: ["Substreams CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      clean_deploy:
        description: "Drop all tables and re-index from scratch"
        type: boolean
        default: false

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  deploy:
    name: Deploy spkg to Hetzner
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: indexers/substreams -> target

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Extract version from substreams.yaml
        id: ver
        working-directory: indexers/substreams
        run: |
          VER=$(grep -m1 'version:' substreams.yaml | awk '{print $2}')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VER"

      - name: Build WASM
        working-directory: indexers/substreams
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install substreams CLI
        run: |
          curl -sL https://github.com/streamingfast/substreams/releases/latest/download/substreams_linux_x86_64.tar.gz | tar xz -C /usr/local/bin
          substreams --version

      - name: Pack all 3 spkgs
        working-directory: indexers/substreams
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: |
          # Core (default sink.module: core_db_out)
          substreams pack -o "onsocial-events-${VER}-core.spkg"

          # Staking
          sed -i 's/module: core_db_out/module: staking_db_out/' substreams.yaml
          substreams pack -o "onsocial-events-${VER}-staking.spkg"

          # Token
          sed -i 's/module: staking_db_out/module: token_db_out/' substreams.yaml
          substreams pack -o "onsocial-events-${VER}-token.spkg"

          # Restore original
          sed -i 's/module: token_db_out/module: core_db_out/' substreams.yaml

          echo "Built spkgs:"
          ls -la onsocial-events-${VER}-*.spkg

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Step 1: Upload spkgs + schema to server staging directory
      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/87856119115/locations/global/workloadIdentityPools/github-ci/providers/github-oidc"
          service_account: "github-ci-deploy@onsocial-protocol.iam.gserviceaccount.com"

      - name: Fetch SSH key from Secret Manager
        id: ssh
        run: |
          gcloud secrets versions access latest \
            --secret="hetzner-testnet-ssh-key" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # Mask every line of the key so it never appears in logs
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done < /tmp/deploy_key
          echo "key<<SSHEOF" >> "$GITHUB_OUTPUT"
          cat /tmp/deploy_key >> "$GITHUB_OUTPUT"
          echo "SSHEOF" >> "$GITHUB_OUTPUT"
          rm -f /tmp/deploy_key

      - name: Upload spkgs and schemas
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 135.181.110.183
          username: root
          key: ${{ steps.ssh.outputs.key }}
          source: >-
            indexers/substreams/onsocial-events-${{ steps.ver.outputs.version }}-core.spkg,
            indexers/substreams/onsocial-events-${{ steps.ver.outputs.version }}-staking.spkg,
            indexers/substreams/onsocial-events-${{ steps.ver.outputs.version }}-token.spkg,
            indexers/substreams/core_schema.sql,
            indexers/substreams/staking_schema.sql,
            indexers/substreams/token_schema.sql
          target: /tmp/onsocial-spkg-upload/
          strip_components: 2
          overwrite: true

      # Step 2: Stop sinks, swap spkgs, restart, health-check with rollback
      - name: Deploy and restart sinks
        uses: appleboy/ssh-action@v1
        env:
          VER: ${{ steps.ver.outputs.version }}
          CLEAN_DEPLOY: ${{ inputs.clean_deploy || 'false' }}
        with:
          host: 135.181.110.183
          username: root
          key: ${{ steps.ssh.outputs.key }}
          envs: VER,CLEAN_DEPLOY
          script: |
            set -euo pipefail
            SPKG_DIR=/root/onsocial-indexer
            UPLOAD_DIR=/tmp/onsocial-spkg-upload

            echo "=== Substreams deploy: ${{ steps.sha.outputs.short }} (${VER}) ==="

            # Verify uploaded files exist
            for variant in core staking token; do
              SRC="${UPLOAD_DIR}/onsocial-events-${VER}-${variant}.spkg"
              if [ ! -f "$SRC" ]; then
                echo "❌ Upload missing: $SRC"
                exit 1
              fi
            done
            echo "✓ All spkgs uploaded"

            # Stop sinks
            systemctl stop onsocial-sink-core onsocial-sink-staking onsocial-sink-token || true
            echo "✓ Sinks stopped"

            # Clean deploy: drop all tables and re-apply schema
            if [ "$CLEAN_DEPLOY" = "true" ]; then
              echo "🧹 Clean deploy requested — dropping tables and cursors"
              if [ -f /root/.onsocial-sink-db-url ]; then
                DB_URL=$(cat /root/.onsocial-sink-db-url)
              else
                DB_URL="${DATABASE_URL:-}"
              fi
              if [ -n "$DB_URL" ]; then
                psql "$DB_URL" -c "
                  DROP TABLE IF EXISTS data_updates CASCADE;
                  DROP TABLE IF EXISTS storage_updates CASCADE;
                  DROP TABLE IF EXISTS group_updates CASCADE;
                  DROP TABLE IF EXISTS contract_updates CASCADE;
                  DROP TABLE IF EXISTS permission_updates CASCADE;
                  DROP TABLE IF EXISTS staking_updates CASCADE;
                  DROP TABLE IF EXISTS token_updates CASCADE;
                  DROP TABLE IF EXISTS cursors CASCADE;
                "
                echo "✓ Tables dropped"
                # Re-apply schemas
                for schema in core staking token; do
                  SCHEMA_FILE="${UPLOAD_DIR}/${schema}_schema.sql"
                  if [ -f "$SCHEMA_FILE" ]; then
                    psql "$DB_URL" -f "$SCHEMA_FILE"
                    echo "✓ Applied ${schema}_schema.sql"
                  fi
                done
              else
                echo "⚠️  No DB_URL found — skipping schema reset (apply manually)"
              fi
            fi

            # Remove old versioned spkgs (different version)
            find "$SPKG_DIR" -name 'onsocial-events-v*-*.spkg' ! -name "*-${VER}-*" -delete 2>/dev/null || true

            # Backup current spkgs
            for variant in core staking token; do
              CURRENT="${SPKG_DIR}/onsocial-events-${VER}-${variant}.spkg"
              [ -f "$CURRENT" ] && cp "$CURRENT" "${CURRENT}.prev"
            done

            # Move uploaded spkgs into place
            for variant in core staking token; do
              mv "${UPLOAD_DIR}/onsocial-events-${VER}-${variant}.spkg" \
                 "${SPKG_DIR}/onsocial-events-${VER}-${variant}.spkg"
            done
            rm -rf "$UPLOAD_DIR"
            echo "✓ Spkgs swapped"

            # Update systemd service files to reference the new version
            for variant in core staking token; do
              UNIT="/etc/systemd/system/onsocial-sink-${variant}.service"
              if [ -f "$UNIT" ]; then
                sed -i "s|onsocial-events-v[0-9.]*-${variant}.spkg|onsocial-events-${VER}-${variant}.spkg|g" "$UNIT"
              fi
            done
            systemctl daemon-reload
            echo "✓ Systemd units updated to ${VER}"

            # Restart sinks
            systemctl start onsocial-sink-core onsocial-sink-staking onsocial-sink-token
            echo "✓ Sinks started"

            # Health check — wait 20s then verify at least 2/3 active
            # (FREE StreamingFast plan allows only 2 concurrent streams)
            sleep 20
            ACTIVE=0
            for s in core staking token; do
              if systemctl is-active --quiet "onsocial-sink-$s"; then
                ACTIVE=$((ACTIVE + 1))
                echo "  ✅ $s: active"
              else
                echo "  ⚠️  $s: $(systemctl is-active onsocial-sink-$s)"
              fi
            done

            if [ "$ACTIVE" -lt 2 ]; then
              echo ""
              echo "❌ Only $ACTIVE/3 sinks active after 20s — rolling back"
              for variant in core staking token; do
                PREV="${SPKG_DIR}/onsocial-events-${VER}-${variant}.spkg.prev"
                [ -f "$PREV" ] && mv "$PREV" "${SPKG_DIR}/onsocial-events-${VER}-${variant}.spkg"
              done
              systemctl restart onsocial-sink-core onsocial-sink-staking onsocial-sink-token || true
              exit 1
            fi

            # Cleanup backups on success
            rm -f ${SPKG_DIR}/*.spkg.prev

            echo ""
            echo "✅ Deploy complete — $ACTIVE/3 sinks active (${VER} @ ${{ steps.sha.outputs.short }})"

      - name: Notify Telegram
        if: always()
        run: |
          STATUS="${{ job.status }}"
          SHA="${{ steps.sha.outputs.short }}"
          VER="${{ steps.ver.outputs.version }}"
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          TOPIC_ID="${{ secrets.TELEGRAM_OPS_TOPIC_ID }}"
          [ -z "$TOKEN" ] || [ -z "$CHAT_ID" ] && exit 0

          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"; MSG="Substreams ${VER} deploy succeeded"
          else
            EMOJI="❌"; MSG="Substreams ${VER} deploy FAILED"
          fi

          TEXT="$EMOJI *$MSG* — \`$SHA\`
          [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          PAYLOAD="{\"chat_id\":\"$CHAT_ID\",\"text\":\"$TEXT\",\"parse_mode\":\"Markdown\""
          if [ -n "$TOPIC_ID" ]; then
            PAYLOAD="$PAYLOAD,\"message_thread_id\":$TOPIC_ID"
          fi
          PAYLOAD="$PAYLOAD}"

          curl -sf -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD" || true
