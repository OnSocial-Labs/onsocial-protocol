name: OnSocial Portal CI

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/onsocial-portal/**'
      - 'packages/onsocial-rpc/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/onsocial-portal-ci.yml'
  pull_request:
    paths:
      - 'packages/onsocial-portal/**'
      - 'packages/onsocial-rpc/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/onsocial-portal-ci.yml'

permissions:
  contents: read

env:
  CI: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Build & Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build RPC dependency
        run: pnpm --filter @onsocial/rpc build

      - name: Lint
        run: pnpm --filter @onsocial/portal lint

      - name: Format check
        run: pnpm --filter @onsocial/portal format:check

      - name: Type check
        run: pnpm --filter @onsocial/portal type-check

      - name: Build
        run: pnpm --filter @onsocial/portal build
