name: Promote Mainnet

'on':
  workflow_call:
    inputs:
      confirm:
        required: false
        type: string
        default: 'promote-mainnet'
      image_tag:
        required: true
        type: string
      promote_backend:
        required: false
        type: string
        default: 'true'
      promote_gateway:
        required: false
        type: string
        default: 'false'
      promote_relayers:
        required: false
        type: string
        default: 'false'
      relayer_deploy_target:
        required: false
        type: string
        default: 'both'
      allowed_contracts:
        required: false
        type: string
        default: 'rewards.onsocial.near'
      app_host:
        required: false
        type: string
        default: ''
      data_host:
        required: false
        type: string
        default: ''
      relayer0_host:
        required: false
        type: string
        default: ''
      relayer1_host:
        required: false
        type: string
        default: ''
      app_ssh_secret_name:
        required: false
        type: string
        default: 'hetzner-mainnet-app-0-ssh-key'
      app_remote_gcloud_key_file:
        required: false
        type: string
        default: '/root/onsocial-app-deploy-key.json'
      relayer0_ssh_secret_name:
        required: false
        type: string
        default: 'hetzner-mainnet-relayer-0-ssh-key'
      relayer1_ssh_secret_name:
        required: false
        type: string
        default: 'hetzner-mainnet-relayer-1-ssh-key'
      signer_secret_name:
        required: false
        type: string
        default: 'relayer-mainnet-signer-json'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "promote-mainnet" to confirm'
        required: true
      image_tag:
        description: 'Existing image tag to promote to mainnet'
        required: true
      promote_backend:
        description: 'Deploy backend using this image tag'
        required: true
        default: 'true'
      promote_gateway:
        description: 'Deploy gateway using this image tag'
        required: true
        default: 'false'
      promote_relayers:
        description: 'Deploy relayer hosts using this image tag'
        required: true
        default: 'false'
      relayer_deploy_target:
        description: 'Which relayer host(s) to deploy when promote_relayers=true'
        required: true
        default: 'both'
      allowed_contracts:
        description: 'Comma-separated mainnet allowlist when promote_relayers=true'
        required: true
        default: 'rewards.onsocial.near'
      app_host:
        description: 'Optional override for mainnet app host/IP'
        required: false
      data_host:
        description: 'Optional override for mainnet data private IP/hostname'
        required: false
      relayer0_host:
        description: 'Optional override for mainnet relayer-0 private IP/hostname'
        required: false
      relayer1_host:
        description: 'Optional override for mainnet relayer-1 private IP/hostname'
        required: false
      app_ssh_secret_name:
        description: 'GSM secret name for the mainnet app host SSH key'
        required: true
        default: 'hetzner-mainnet-app-0-ssh-key'
      app_remote_gcloud_key_file:
        description: 'Path on the app host to the service-account key used for remote secret pulls'
        required: false
        default: '/root/onsocial-app-deploy-key.json'
      relayer0_ssh_secret_name:
        description: 'GSM secret name for relayer-0 SSH key'
        required: true
        default: 'hetzner-mainnet-relayer-0-ssh-key'
      relayer1_ssh_secret_name:
        description: 'GSM secret name for relayer-1 SSH key'
        required: true
        default: 'hetzner-mainnet-relayer-1-ssh-key'
      signer_secret_name:
        description: 'GSM secret name for relayer signer JSON'
        required: true
        default: 'relayer-mainnet-signer-json'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/onsocial-labs/onsocial-protocol
  APP_HOST: ${{ inputs.app_host != '' && inputs.app_host || vars.MAINNET_APP_HOST }}
  DATA_HOST: ${{ inputs.data_host != '' && inputs.data_host || vars.MAINNET_DATA_HOST }}
  RELAYER0_HOST: ${{ inputs.relayer0_host != '' && inputs.relayer0_host || vars.MAINNET_RELAYER_0_HOST }}
  RELAYER1_HOST: ${{ inputs.relayer1_host != '' && inputs.relayer1_host || vars.MAINNET_RELAYER_1_HOST }}

concurrency:
  group: mainnet-promotion
  cancel-in-progress: false

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  validate:
    name: Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation and tag
        run: |
          if [ "${{ inputs.confirm }}" != "promote-mainnet" ]; then
            echo "❌ Confirmation failed. Type 'promote-mainnet' to proceed."
            exit 1
          fi

          IMAGE_TAG="${{ inputs.image_tag }}"
          if [ -z "$IMAGE_TAG" ]; then
            echo "❌ image_tag is required"
            exit 1
          fi

          case "$IMAGE_TAG" in
            *[!A-Za-z0-9._-]*)
              echo "❌ image_tag contains unsupported characters"
              exit 1
              ;;
          esac

          echo "✅ Confirmation and image tag accepted"

      - name: Check promotion scope
        run: |
          PROMOTE_BACKEND="${{ inputs.promote_backend }}"
          PROMOTE_GATEWAY="${{ inputs.promote_gateway }}"
          PROMOTE_RELAYERS="${{ inputs.promote_relayers }}"
          RELAYER_TARGET="${{ inputs.relayer_deploy_target }}"
          ALLOWED_CONTRACTS="${{ inputs.allowed_contracts }}"

          for value in "$PROMOTE_BACKEND" "$PROMOTE_GATEWAY" "$PROMOTE_RELAYERS"; do
            if [ "$value" != "true" ] && [ "$value" != "false" ]; then
              echo "❌ promote_backend, promote_gateway, and promote_relayers must be true or false"
              exit 1
            fi
          done

          if [ "$PROMOTE_BACKEND" != "true" ] && [ "$PROMOTE_GATEWAY" != "true" ] && [ "$PROMOTE_RELAYERS" != "true" ]; then
            echo "❌ Enable at least one of promote_backend, promote_gateway, or promote_relayers"
            exit 1
          fi

          if [ "$PROMOTE_BACKEND" = "true" ] || [ "$PROMOTE_GATEWAY" = "true" ]; then
            if [ -z "${{ env.APP_HOST }}" ] || [ -z "${{ env.DATA_HOST }}" ] || [ -z "${{ env.RELAYER0_HOST }}" ] || [ -z "${{ env.RELAYER1_HOST }}" ]; then
              echo "❌ Mainnet app topology is incomplete. Configure vars.MAINNET_APP_HOST, vars.MAINNET_DATA_HOST, vars.MAINNET_RELAYER_0_HOST, and vars.MAINNET_RELAYER_1_HOST or pass overrides."
              exit 1
            fi
          fi

          if [ "$PROMOTE_RELAYERS" = "true" ]; then
            case "$RELAYER_TARGET" in
              relayer-0|relayer-1|both)
                ;;
              *)
                echo "❌ relayer_deploy_target must be one of: relayer-0, relayer-1, both"
                exit 1
                ;;
            esac

            if [ -z "$ALLOWED_CONTRACTS" ]; then
              echo "❌ allowed_contracts must not be empty when promote_relayers=true"
              exit 1
            fi

            if [ "$RELAYER_TARGET" != "relayer-1" ] && [ -z "${{ env.RELAYER0_HOST }}" ]; then
              echo "❌ RELAYER0_HOST is not set. Provide relayer0_host or configure MAINNET_RELAYER_0_HOST."
              exit 1
            fi

            if [ "$RELAYER_TARGET" != "relayer-0" ] && [ -z "${{ env.RELAYER1_HOST }}" ]; then
              echo "❌ RELAYER1_HOST is not set. Provide relayer1_host or configure MAINNET_RELAYER_1_HOST."
              exit 1
            fi

            if [ "$RELAYER_TARGET" = "both" ] && [ "${{ env.RELAYER0_HOST }}" = "${{ env.RELAYER1_HOST }}" ]; then
              echo "❌ relayer-0 and relayer-1 must resolve to different hosts"
              exit 1
            fi
          fi

          echo "✅ Promotion scope accepted"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate image availability
        run: |
          set -euo pipefail

          tag="${{ inputs.image_tag }}"
          required_images=()

          if [ "${{ inputs.promote_backend }}" = "true" ] || [ "${{ inputs.promote_gateway }}" = "true" ]; then
            required_images+=(caddy)
          fi

          if [ "${{ inputs.promote_backend }}" = "true" ]; then
            required_images+=(backend)
          fi

          if [ "${{ inputs.promote_gateway }}" = "true" ]; then
            required_images+=(gateway)
          fi

          if [ "${{ inputs.promote_relayers }}" = "true" ]; then
            required_images+=(relayer)
          fi

          for image in "${required_images[@]}"; do
            ref="${{ env.IMAGE_PREFIX }}/${image}:${tag}"
            if ! docker manifest inspect "$ref" >/dev/null 2>&1; then
              echo "❌ Required image tag not found: $ref"
              exit 1
            fi
            echo "✅ Found image: $ref"
          done

  deploy-backend:
    name: Promote Backend
    needs: validate
    if: ${{ inputs.promote_backend == 'true' }}
    uses: ./.github/workflows/deploy-mainnet-app.yml
    with:
      deploy_target: backend
      image_tag: ${{ inputs.image_tag }}
      app_host: ${{ inputs.app_host }}
      data_host: ${{ inputs.data_host }}
      relayer0_host: ${{ inputs.relayer0_host }}
      relayer1_host: ${{ inputs.relayer1_host }}
      app_ssh_secret_name: ${{ inputs.app_ssh_secret_name }}
      remote_gcloud_key_file: ${{ inputs.app_remote_gcloud_key_file }}
    secrets: inherit

  deploy-gateway:
    name: Promote Gateway
    needs:
      - validate
      - deploy-backend
    if: ${{ always() && inputs.promote_gateway == 'true' && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') }}
    uses: ./.github/workflows/deploy-mainnet-app.yml
    with:
      deploy_target: gateway
      image_tag: ${{ inputs.image_tag }}
      app_host: ${{ inputs.app_host }}
      data_host: ${{ inputs.data_host }}
      relayer0_host: ${{ inputs.relayer0_host }}
      relayer1_host: ${{ inputs.relayer1_host }}
      app_ssh_secret_name: ${{ inputs.app_ssh_secret_name }}
      remote_gcloud_key_file: ${{ inputs.app_remote_gcloud_key_file }}
    secrets: inherit

  deploy-relayer-1:
    name: Promote mainnet-relayer-1
    needs:
      - validate
      - deploy-backend
      - deploy-gateway
    if: ${{ always() && inputs.promote_relayers == 'true' && (inputs.relayer_deploy_target == 'relayer-1' || inputs.relayer_deploy_target == 'both') && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') && (needs.deploy-gateway.result == 'success' || needs.deploy-gateway.result == 'skipped') }}
    runs-on: [self-hosted, linux, x64, onsocial-mainnet-private]
    environment:
      name: mainnet
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/87856119115/locations/global/workloadIdentityPools/github-ci/providers/github-oidc"
          service_account: "github-ci-deploy@onsocial-protocol.iam.gserviceaccount.com"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify relayer-1 deploy secrets
        run: |
          for secret in \
            "${{ inputs.relayer1_ssh_secret_name }}" \
            "${{ inputs.signer_secret_name }}" \
            RELAYER_API_KEY \
            LAVA_API_KEY; do
            gcloud secrets versions access latest --secret="$secret" >/dev/null
          done

      - name: Prepare relayer-1 SSH material
        run: |
          mkdir -p "$RUNNER_TEMP/ssh"
          chmod 700 "$RUNNER_TEMP/ssh"

      - name: Fetch relayer-1 SSH key
        run: |
          gcloud secrets versions access latest \
            --secret="${{ inputs.relayer1_ssh_secret_name }}" \
            --out-file="$RUNNER_TEMP/ssh/relayer1_deploy_key"
          test -s "$RUNNER_TEMP/ssh/relayer1_deploy_key"
          chmod 600 "$RUNNER_TEMP/ssh/relayer1_deploy_key"

      - name: Trust relayer-1 host key
        run: |
          ssh-keyscan -H "${{ env.RELAYER1_HOST }}" >> "$RUNNER_TEMP/ssh/known_hosts" 2>/dev/null
          test -s "$RUNNER_TEMP/ssh/known_hosts"

      - name: Fetch shared signer JSON
        run: |
          gcloud secrets versions access latest \
            --secret="${{ inputs.signer_secret_name }}" \
            --out-file="$RUNNER_TEMP/relayer-signer.json"
          test -s "$RUNNER_TEMP/relayer-signer.json"
          chmod 600 "$RUNNER_TEMP/relayer-signer.json"

      - name: Run relayer-1 preflight
        run: |
          DEPLOY_SSH_KEY="$RUNNER_TEMP/ssh/relayer1_deploy_key" \
          DEPLOY_SSH_KNOWN_HOSTS="$RUNNER_TEMP/ssh/known_hosts" \
          bash deployment/deploy-relayer-host.sh \
            --host "${{ env.RELAYER1_HOST }}" \
            --instance-name relayer-1 \
            --keyring relayer-keys-mainnet-1 \
            --signer-file "$RUNNER_TEMP/relayer-signer.json" \
            --network mainnet \
            --allowed-contracts "${{ inputs.allowed_contracts }}" \
            --dry-run

      - name: Deploy relayer-1
        run: |
          DEPLOY_SSH_KEY="$RUNNER_TEMP/ssh/relayer1_deploy_key" \
          DEPLOY_SSH_KNOWN_HOSTS="$RUNNER_TEMP/ssh/known_hosts" \
          bash deployment/deploy-relayer-host.sh \
            --host "${{ env.RELAYER1_HOST }}" \
            --instance-name relayer-1 \
            --keyring relayer-keys-mainnet-1 \
            --signer-file "$RUNNER_TEMP/relayer-signer.json" \
            --network mainnet \
            --image-tag "${{ inputs.image_tag }}" \
            --allowed-contracts "${{ inputs.allowed_contracts }}"

      - name: Verify relayer-1
        run: |
          curl -sf "http://${{ env.RELAYER1_HOST }}:3040/health" | tee /tmp/relayer1-health.json
          IFS=',' read -ra contracts <<< "${{ inputs.allowed_contracts }}"
          for contract in "${contracts[@]}"; do
            contract="$(echo "$contract" | xargs)"
            [ -n "$contract" ] || continue
            grep -q "$contract" /tmp/relayer1-health.json
          done

      - name: Summarize relayer-1 promotion
        run: |
          {
            echo "## Mainnet Relayer-1 Promotion"
            echo ""
            echo "- Image tag: ${{ inputs.image_tag }}"
            echo "- Host: ${{ env.RELAYER1_HOST }}"
            echo "- Allowed contracts: ${{ inputs.allowed_contracts }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup relayer-1 SSH material
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/ssh/relayer1_deploy_key" "$RUNNER_TEMP/ssh/known_hosts" "$RUNNER_TEMP/relayer-signer.json"

  deploy-relayer-0-only:
    name: Promote mainnet-relayer-0
    needs:
      - validate
      - deploy-backend
      - deploy-gateway
    if: ${{ always() && inputs.promote_relayers == 'true' && inputs.relayer_deploy_target == 'relayer-0' && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') && (needs.deploy-gateway.result == 'success' || needs.deploy-gateway.result == 'skipped') }}
    runs-on: [self-hosted, linux, x64, onsocial-mainnet-private]
    environment:
      name: mainnet
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/87856119115/locations/global/workloadIdentityPools/github-ci/providers/github-oidc"
          service_account: "github-ci-deploy@onsocial-protocol.iam.gserviceaccount.com"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify relayer-0 deploy secrets
        run: |
          for secret in \
            "${{ inputs.relayer0_ssh_secret_name }}" \
            "${{ inputs.signer_secret_name }}" \
            RELAYER_API_KEY \
            LAVA_API_KEY; do
            gcloud secrets versions access latest --secret="$secret" >/dev/null
          done

      - name: Prepare relayer-0 SSH material
        run: |
          mkdir -p "$RUNNER_TEMP/ssh"
          chmod 700 "$RUNNER_TEMP/ssh"

      - name: Fetch relayer-0 SSH key
        run: |
          gcloud secrets versions access latest \
            --secret="${{ inputs.relayer0_ssh_secret_name }}" \
            --out-file="$RUNNER_TEMP/ssh/relayer0_deploy_key"
          test -s "$RUNNER_TEMP/ssh/relayer0_deploy_key"
          chmod 600 "$RUNNER_TEMP/ssh/relayer0_deploy_key"

      - name: Trust relayer-0 host key
        run: |
          ssh-keyscan -H "${{ env.RELAYER0_HOST }}" >> "$RUNNER_TEMP/ssh/known_hosts" 2>/dev/null
          test -s "$RUNNER_TEMP/ssh/known_hosts"

      - name: Fetch shared signer JSON
        run: |
          gcloud secrets versions access latest \
            --secret="${{ inputs.signer_secret_name }}" \
            --out-file="$RUNNER_TEMP/relayer-signer.json"
          test -s "$RUNNER_TEMP/relayer-signer.json"
          chmod 600 "$RUNNER_TEMP/relayer-signer.json"

      - name: Run relayer-0 preflight
        run: |
          DEPLOY_SSH_KEY="$RUNNER_TEMP/ssh/relayer0_deploy_key" \
          DEPLOY_SSH_KNOWN_HOSTS="$RUNNER_TEMP/ssh/known_hosts" \
          bash deployment/deploy-relayer-host.sh \
            --host "${{ env.RELAYER0_HOST }}" \
            --instance-name relayer-0 \
            --keyring relayer-keys-mainnet \
            --signer-file "$RUNNER_TEMP/relayer-signer.json" \
            --network mainnet \
            --allowed-contracts "${{ inputs.allowed_contracts }}" \
            --dry-run

      - name: Deploy relayer-0
        run: |
          DEPLOY_SSH_KEY="$RUNNER_TEMP/ssh/relayer0_deploy_key" \
          DEPLOY_SSH_KNOWN_HOSTS="$RUNNER_TEMP/ssh/known_hosts" \
          bash deployment/deploy-relayer-host.sh \
            --host "${{ env.RELAYER0_HOST }}" \
            --instance-name relayer-0 \
            --keyring relayer-keys-mainnet \
            --signer-file "$RUNNER_TEMP/relayer-signer.json" \
            --network mainnet \
            --image-tag "${{ inputs.image_tag }}" \
            --allowed-contracts "${{ inputs.allowed_contracts }}"

      - name: Verify relayer-0
        run: |
          curl -sf "http://${{ env.RELAYER0_HOST }}:3040/health" | tee /tmp/relayer0-health.json
          IFS=',' read -ra contracts <<< "${{ inputs.allowed_contracts }}"
          for contract in "${contracts[@]}"; do
            contract="$(echo "$contract" | xargs)"
            [ -n "$contract" ] || continue
            grep -q "$contract" /tmp/relayer0-health.json
          done

      - name: Summarize relayer-0 promotion
        run: |
          {
            echo "## Mainnet Relayer-0 Promotion"
            echo ""
            echo "- Image tag: ${{ inputs.image_tag }}"
            echo "- Host: ${{ env.RELAYER0_HOST }}"
            echo "- Allowed contracts: ${{ inputs.allowed_contracts }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup relayer-0 SSH material
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/ssh/relayer0_deploy_key" "$RUNNER_TEMP/ssh/known_hosts" "$RUNNER_TEMP/relayer-signer.json"

  deploy-relayer-0-after-relayer-1:
    name: Promote mainnet-relayer-0
    needs:
      - validate
      - deploy-backend
      - deploy-gateway
      - deploy-relayer-1
    if: ${{ always() && inputs.promote_relayers == 'true' && inputs.relayer_deploy_target == 'both' && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') && (needs.deploy-gateway.result == 'success' || needs.deploy-gateway.result == 'skipped') && needs.deploy-relayer-1.result == 'success' }}
    runs-on: [self-hosted, linux, x64, onsocial-mainnet-private]
    environment:
      name: mainnet
    steps:
      - uses: actions/checkout@v5

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/87856119115/locations/global/workloadIdentityPools/github-ci/providers/github-oidc"
          service_account: "github-ci-deploy@onsocial-protocol.iam.gserviceaccount.com"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Verify relayer-0 deploy secrets
        run: |
          for secret in \
            "${{ inputs.relayer0_ssh_secret_name }}" \
            "${{ inputs.signer_secret_name }}" \
            RELAYER_API_KEY \
            LAVA_API_KEY; do
            gcloud secrets versions access latest --secret="$secret" >/dev/null
          done

      - name: Prepare relayer-0 SSH material
        run: |
          mkdir -p "$RUNNER_TEMP/ssh"
          chmod 700 "$RUNNER_TEMP/ssh"

      - name: Fetch relayer-0 SSH key
        run: |
          gcloud secrets versions access latest \
            --secret="${{ inputs.relayer0_ssh_secret_name }}" \
            --out-file="$RUNNER_TEMP/ssh/relayer0_deploy_key"
          test -s "$RUNNER_TEMP/ssh/relayer0_deploy_key"
          chmod 600 "$RUNNER_TEMP/ssh/relayer0_deploy_key"

      - name: Trust relayer-0 host key
        run: |
          ssh-keyscan -H "${{ env.RELAYER0_HOST }}" >> "$RUNNER_TEMP/ssh/known_hosts" 2>/dev/null
          test -s "$RUNNER_TEMP/ssh/known_hosts"

      - name: Fetch shared signer JSON
        run: |
          gcloud secrets versions access latest \
            --secret="${{ inputs.signer_secret_name }}" \
            --out-file="$RUNNER_TEMP/relayer-signer.json"
          test -s "$RUNNER_TEMP/relayer-signer.json"
          chmod 600 "$RUNNER_TEMP/relayer-signer.json"

      - name: Run relayer-0 preflight
        run: |
          DEPLOY_SSH_KEY="$RUNNER_TEMP/ssh/relayer0_deploy_key" \
          DEPLOY_SSH_KNOWN_HOSTS="$RUNNER_TEMP/ssh/known_hosts" \
          bash deployment/deploy-relayer-host.sh \
            --host "${{ env.RELAYER0_HOST }}" \
            --instance-name relayer-0 \
            --keyring relayer-keys-mainnet \
            --signer-file "$RUNNER_TEMP/relayer-signer.json" \
            --network mainnet \
            --allowed-contracts "${{ inputs.allowed_contracts }}" \
            --dry-run

      - name: Deploy relayer-0
        run: |
          DEPLOY_SSH_KEY="$RUNNER_TEMP/ssh/relayer0_deploy_key" \
          DEPLOY_SSH_KNOWN_HOSTS="$RUNNER_TEMP/ssh/known_hosts" \
          bash deployment/deploy-relayer-host.sh \
            --host "${{ env.RELAYER0_HOST }}" \
            --instance-name relayer-0 \
            --keyring relayer-keys-mainnet \
            --signer-file "$RUNNER_TEMP/relayer-signer.json" \
            --network mainnet \
            --image-tag "${{ inputs.image_tag }}" \
            --allowed-contracts "${{ inputs.allowed_contracts }}"

      - name: Verify relayer-0
        run: |
          curl -sf "http://${{ env.RELAYER0_HOST }}:3040/health" | tee /tmp/relayer0-health.json
          IFS=',' read -ra contracts <<< "${{ inputs.allowed_contracts }}"
          for contract in "${contracts[@]}"; do
            contract="$(echo "$contract" | xargs)"
            [ -n "$contract" ] || continue
            grep -q "$contract" /tmp/relayer0-health.json
          done

      - name: Summarize relayer-0 promotion
        run: |
          {
            echo "## Mainnet Relayer-0 Promotion"
            echo ""
            echo "- Image tag: ${{ inputs.image_tag }}"
            echo "- Host: ${{ env.RELAYER0_HOST }}"
            echo "- Allowed contracts: ${{ inputs.allowed_contracts }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup relayer-0 SSH material
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/ssh/relayer0_deploy_key" "$RUNNER_TEMP/ssh/known_hosts" "$RUNNER_TEMP/relayer-signer.json"

  smoke:
    name: Integrated Smoke Checks
    needs:
      - validate
      - deploy-backend
      - deploy-gateway
      - deploy-relayer-1
      - deploy-relayer-0-only
      - deploy-relayer-0-after-relayer-1
    if: ${{ always() && (needs.validate.result == 'success') && (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') && (needs.deploy-gateway.result == 'success' || needs.deploy-gateway.result == 'skipped') && (needs.deploy-relayer-1.result == 'success' || needs.deploy-relayer-1.result == 'skipped') && (needs.deploy-relayer-0-only.result == 'success' || needs.deploy-relayer-0-only.result == 'skipped') && (needs.deploy-relayer-0-after-relayer-1.result == 'success' || needs.deploy-relayer-0-after-relayer-1.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment:
      name: mainnet
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/87856119115/locations/global/workloadIdentityPools/github-ci/providers/github-oidc"
          service_account: "github-ci-deploy@onsocial-protocol.iam.gserviceaccount.com"

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Fetch app SSH key from Secret Manager
        run: |
          test -n "${{ env.APP_HOST }}" || { echo "❌ APP_HOST is required for integrated smoke checks"; exit 1; }
          mkdir -p "$RUNNER_TEMP/ssh"
          chmod 700 "$RUNNER_TEMP/ssh"
          gcloud secrets versions access latest \
            --secret="${{ inputs.app_ssh_secret_name }}" \
            --out-file="$RUNNER_TEMP/ssh/app_deploy_key"
          test -s "$RUNNER_TEMP/ssh/app_deploy_key"
          chmod 600 "$RUNNER_TEMP/ssh/app_deploy_key"

      - name: Trust app host key
        run: |
          ssh-keyscan -H "${{ env.APP_HOST }}" >> "$RUNNER_TEMP/ssh/known_hosts" 2>/dev/null
          test -s "$RUNNER_TEMP/ssh/known_hosts"

      - name: Check local app host services
        run: |
          printf '%s\n' \
            'set -euo pipefail' \
            '' \
            'PROMOTE_RELAYERS="$1"' \
            'RELAYER_TARGET="$2"' \
            'RELAYER0_HOST="$3"' \
            'RELAYER1_HOST="$4"' \
            'ALLOWED_CONTRACTS="$5"' \
            '' \
            'check_url() {' \
            '  local name="$1"' \
            '  local url="$2"' \
            '  curl -sf --max-time 10 "$url" >/dev/null' \
            '  echo "✅ $name healthy"' \
            '}' \
            '' \
            'backend_slot="$(cat /opt/onsocial/.backend-slot 2>/dev/null || echo blue)"' \
            'gateway_slot="$(cat /opt/onsocial/.gateway-slot 2>/dev/null || echo blue)"' \
            '' \
            'if [ "$backend_slot" = "blue" ]; then' \
            '  backend_url="http://127.0.0.1:14001/health"' \
            'else' \
            '  backend_url="http://127.0.0.1:24001/health"' \
            'fi' \
            '' \
            'if [ "$gateway_slot" = "blue" ]; then' \
            '  gateway_url="http://127.0.0.1:18080/health"' \
            'else' \
            '  gateway_url="http://127.0.0.1:28080/health"' \
            'fi' \
            '' \
            'check_url "backend-${backend_slot}" "$backend_url"' \
            'check_url "gateway-${gateway_slot}" "$gateway_url"' \
            'check_url "relayer-lb" "http://127.0.0.1:3040/health"' \
            '' \
            'if [ "$PROMOTE_RELAYERS" = "true" ]; then' \
            '  if [ "$RELAYER_TARGET" = "relayer-0" ] || [ "$RELAYER_TARGET" = "both" ]; then' \
            '    curl -sf --max-time 10 "http://${RELAYER0_HOST}:3040/health" | tee /tmp/relayer0-health.json >/dev/null' \
            '    IFS='"'"','"'"' read -ra contracts <<< "$ALLOWED_CONTRACTS"' \
            '    for contract in "${contracts[@]}"; do' \
            '      contract="$(echo "$contract" | xargs)"' \
            '      [ -n "$contract" ] || continue' \
            '      grep -q "$contract" /tmp/relayer0-health.json' \
            '    done' \
            '    echo "✅ relayer-0 health and allowlist verified"' \
            '  fi' \
            '' \
            '  if [ "$RELAYER_TARGET" = "relayer-1" ] || [ "$RELAYER_TARGET" = "both" ]; then' \
            '    curl -sf --max-time 10 "http://${RELAYER1_HOST}:3040/health" | tee /tmp/relayer1-health.json >/dev/null' \
            '    IFS='"'"','"'"' read -ra contracts <<< "$ALLOWED_CONTRACTS"' \
            '    for contract in "${contracts[@]}"; do' \
            '      contract="$(echo "$contract" | xargs)"' \
            '      [ -n "$contract" ] || continue' \
            '      grep -q "$contract" /tmp/relayer1-health.json' \
            '    done' \
            '    echo "✅ relayer-1 health and allowlist verified"' \
            '  fi' \
            'fi' \
            | ssh -i "$RUNNER_TEMP/ssh/app_deploy_key" \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile="$RUNNER_TEMP/ssh/known_hosts" \
              "root@${{ env.APP_HOST }}" \
              bash -s -- \
              "${{ inputs.promote_relayers }}" \
              "${{ inputs.relayer_deploy_target }}" \
              "${{ env.RELAYER0_HOST }}" \
              "${{ env.RELAYER1_HOST }}" \
              "${{ inputs.allowed_contracts }}"

      - name: Check public gateway endpoints
        run: |
          curl -fsSI --max-time 15 \
            --resolve api.onsocial.id:443:${{ env.APP_HOST }} \
            https://api.onsocial.id/health
          stats_code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 \
            --resolve api.onsocial.id:443:${{ env.APP_HOST }} \
            https://api.onsocial.id/public/stats)"

          if [ "$stats_code" = "200" ]; then
            echo "✅ Public stats endpoint available"
          else
            echo "⚠️ Public stats endpoint returned HTTP $stats_code (non-fatal)"
            echo "PUBLIC_STATS_STATUS=optional-miss:$stats_code" >> "$GITHUB_ENV"
          fi

      - name: Summarize smoke results
        run: |
          {
            echo "## Integrated Smoke Checks"
            echo ""
            echo "- Public health: https://api.onsocial.id/health"
            echo "- Public stats: https://api.onsocial.id/public/stats (${PUBLIC_STATS_STATUS:-available})"
            echo "- App host: ${{ env.APP_HOST }}"
            echo "- Relayer target: ${{ inputs.relayer_deploy_target }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup SSH material
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/ssh/app_deploy_key" "$RUNNER_TEMP/ssh/known_hosts"