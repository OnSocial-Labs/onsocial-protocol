name: Deploy Testnet

on:
  push:
    branches: [main]
    paths:
      - 'packages/onsocial-relayer/**'
      - 'packages/onsocial-gateway/**'
      - 'packages/onsocial-backend/**'
      - 'packages/onsocial-rpc/**'
      - 'docker/**'
      - 'deployment/**'
      - '.github/workflows/deploy-testnet.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/onsocial-labs/onsocial-protocol

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ── Build & push Docker images to GHCR ──────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: caddy
            dockerfile: docker/Dockerfile.caddy
            context: docker
          - image: gateway
            dockerfile: docker/Dockerfile.gateway
            context: .
          - image: relayer
            dockerfile: docker/Dockerfile.relayer
            context: .
          - image: backend
            dockerfile: docker/Dockerfile.backend
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to testnet server ─────────────────────────────────────────
  deploy:
    name: Deploy to Testnet
    needs: build
    runs-on: ubuntu-latest
    environment: testnet

    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/87856119115/locations/global/workloadIdentityPools/github-ci/providers/github-oidc"
          service_account: "github-ci-deploy@onsocial-protocol.iam.gserviceaccount.com"

      - name: Fetch SSH key from Secret Manager
        id: ssh
        run: |
          gcloud secrets versions access latest \
            --secret="hetzner-testnet-ssh-key" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # Mask every line of the key so it never appears in logs
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done < /tmp/deploy_key
          echo "key<<SSHEOF" >> "$GITHUB_OUTPUT"
          cat /tmp/deploy_key >> "$GITHUB_OUTPUT"
          echo "SSHEOF" >> "$GITHUB_OUTPUT"
          rm -f /tmp/deploy_key

      - name: Sync config files to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ steps.ssh.outputs.key }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 135.181.110.183 >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/deploy_key \
            deployment/docker-compose.yml \
            deployment/Caddyfile \
            deployment/Caddyfile.relayer \
            deployment/init-extra-dbs.sh \
            root@135.181.110.183:/opt/onsocial/
          ssh -i ~/.ssh/deploy_key root@135.181.110.183 \
            'chmod +x /opt/onsocial/init-extra-dbs.sh'
          echo "✅ Config files synced to server"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 135.181.110.183
          username: root
          key: ${{ steps.ssh.outputs.key }}
          script: |
            set -euo pipefail
            cd /opt/onsocial

            upsert_env() {
              local key="$1" value="$2"
              if grep -q "^${key}=" .env.production; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env.production
              else
                printf '%s=%s\n' "$key" "$value" >> .env.production
              fi
            }

            if [ ! -f .env.production ]; then
              echo "❌ Missing /opt/onsocial/.env.production"
              exit 1
            fi

            upsert_env "NEAR_NETWORK" "testnet"
            upsert_env "RELAYER_ACCOUNT_ID" "relayer.onsocial.testnet"
            upsert_env "RELAYER_CONTRACT_ID" "core.onsocial.testnet"
            upsert_env "SOCIAL_TOKEN_CONTRACT" "token.onsocial.testnet"
            upsert_env "STAKING_CONTRACT" "staking.onsocial.testnet"
            upsert_env "MARKETPLACE_CONTRACT" "marketplace.onsocial.testnet"
            upsert_env "GCP_KMS_KEYRING_0" "relayer-keys-testnet"
            upsert_env "GCP_KMS_KEYRING_1" "relayer-keys-inst-1"
            upsert_env "PUBLIC_DOMAIN" "testnet.onsocial.id"
            upsert_env "CORS_ORIGINS" "https://testnet.onsocial.id,http://localhost:3000,http://localhost:4000"
            upsert_env "HASURA_GRAPHQL_CORS_DOMAIN" "https://testnet.onsocial.id,http://localhost:3000"
            upsert_env "NEARBLOCKS_API_URL" "https://api-testnet.nearblocks.io"

            # ── Health check helpers ─────────────────────────────────
            check_health() {
              local name="$1" url="$2" retries="${3:-20}" delay="${4:-3}"
              for i in $(seq 1 "$retries"); do
                if curl -sf --max-time 5 "$url" > /dev/null 2>&1; then
                  echo "  ✅ $name healthy (attempt $i/$retries)"
                  return 0
                fi
                echo "  ⏳ $name not ready ($i/$retries)..."
                sleep "$delay"
              done
              echo "  ❌ $name failed after $retries attempts"
              return 1
            }
            check_container_health() {
              local name="$1" service="$2" url="$3" retries="${4:-20}" delay="${5:-3}"
              for i in $(seq 1 "$retries"); do
                if docker compose exec -T "$service" curl -sf --max-time 5 "$url" > /dev/null 2>&1 \
                || docker compose exec -T "$service" wget -qO- --timeout=5 "$url" > /dev/null 2>&1; then
                  echo "  ✅ $name healthy (attempt $i/$retries)"
                  return 0
                fi
                echo "  ⏳ $name not ready ($i/$retries)..."
                sleep "$delay"
              done
              echo "  ❌ $name failed after $retries attempts"
              return 1
            }

            # ── Rollback helper (skips if no previous tag) ───────────
            rollback() {
              local services="$1"
              if [ "$PREV_TAG" = "unknown" ]; then
                echo "⚠️  No previous tag — cannot rollback, just restarting current"
                docker compose up -d --no-deps $services
              else
                echo "IMAGE_TAG=$PREV_TAG" > .env.image
                set -a && source .env.production && source .env.image && set +a
                docker compose pull $services || true
                docker compose up -d --no-deps $services
              fi
            }

            # ── Save previous tag for rollback ───────────────────────
            PREV_TAG="unknown"
            [ -f .env.image ] && PREV_TAG=$(grep IMAGE_TAG .env.image | cut -d= -f2)
            echo "Previous tag: $PREV_TAG"

            # ── Set new image tag ────────────────────────────────────
            echo "IMAGE_TAG=${{ steps.sha.outputs.short }}" > .env.image
            set -a && source .env.production && source .env.image && set +a

            # ── Pull new images ──────────────────────────────────────
            docker compose pull caddy gateway relayer-0 relayer-1 backend

            # ── Rolling restart: relayer-1 → verify → relayer-0 → verify
            echo "Rolling relayer-1..."
            docker compose up -d --no-deps relayer-1
            if ! check_container_health "relayer-1" "relayer-1" "http://localhost:3040/ready" 20 3; then
              echo "❌ relayer-1 health check failed — rolling back"
              rollback "relayer-1"
              exit 1
            fi

            echo "Rolling relayer-0..."
            docker compose up -d --no-deps relayer-0
            if ! check_container_health "relayer-0" "relayer-0" "http://localhost:3040/ready" 20 3; then
              echo "❌ relayer-0 health check failed — rolling back"
              rollback "relayer-0 relayer-1"
              exit 1
            fi

            # ── Gateway restart → verify → then Caddy ────────────────
            echo "Rolling gateway..."
            docker compose up -d --no-deps gateway
            if ! check_container_health "gateway" "gateway" "http://localhost:8080/health" 20 3; then
              echo "❌ Gateway health check failed — rolling back"
              rollback "gateway relayer-0 relayer-1"
              exit 1
            fi

            # ── Sync Hasura permissions (idempotent — skips existing) ─
            echo "Syncing Hasura permissions..."
            docker compose exec -T gateway node packages/onsocial-gateway/dist/scripts/apply-hasura-permissions.js create 2>&1 || \
              echo "⚠️  Hasura permission sync skipped (script not built or unavailable)"

            echo "Reloading caddy..."
            docker compose up -d --no-deps caddy
            if ! check_health "caddy (public)" "https://testnet.onsocial.id/health" 10 5; then
              echo "⚠️  Public health check failed — services may still be starting"
            fi

            # ── Backend (Telegram rewards bot) ───────────────────────
            echo "Rolling backend..."
            docker compose up -d --no-deps backend
            if ! check_container_health "backend" "backend" "http://localhost:4001/health" 10 3; then
              echo "❌ Backend health check failed — rolling back"
              rollback "backend gateway relayer-0 relayer-1"
              exit 1
            fi

            # ── Bring up any remaining services ──────────────────────
            docker compose up -d

            echo ""
            docker compose ps --format "table {{.Name}}\t{{.Status}}"
            echo ""
            echo "✅ Testnet deploy complete — ${{ steps.sha.outputs.short }} (prev: $PREV_TAG)"

      - name: Notify deploy result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          SHA="${{ steps.sha.outputs.short }}"
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          TOPIC_ID="${{ secrets.TELEGRAM_OPS_TOPIC_ID }}"
          [ -z "$TOKEN" ] || [ -z "$CHAT_ID" ] && exit 0
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅" MSG="Testnet deploy succeeded"
          else
            EMOJI="❌" MSG="Testnet deploy FAILED"
          fi
          TEXT="$EMOJI *$MSG* — \`$SHA\` [run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          PAYLOAD="{\"chat_id\": \"$CHAT_ID\", \"text\": \"$TEXT\", \"parse_mode\": \"Markdown\""
          if [ -n "$TOPIC_ID" ]; then
            PAYLOAD="$PAYLOAD, \"message_thread_id\": $TOPIC_ID"
          fi
          PAYLOAD="$PAYLOAD}"

          curl -sf -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD" || true
