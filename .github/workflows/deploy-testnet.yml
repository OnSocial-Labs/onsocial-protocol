name: Deploy Testnet

on:
  push:
    branches: [main]
    paths:
      - 'packages/onsocial-relayer/**'
      - 'packages/onsocial-gateway/**'
      - 'packages/onsocial-backend/**'
      - 'packages/onsocial-pages/**'
      - 'packages/onsocial-rpc/**'
      - 'docker/**'
      - 'deployment/**'
      - 'scripts/pull-secrets.sh'
      - '.github/workflows/deploy-testnet.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/onsocial-labs/onsocial-protocol
  DEPLOY_HOST: 135.181.110.183

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ── Build & push Docker images to GHCR ──────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: caddy
            dockerfile: docker/Dockerfile.caddy
            context: docker
          - image: gateway
            dockerfile: docker/Dockerfile.gateway
            context: .
          - image: relayer
            dockerfile: docker/Dockerfile.relayer
            context: .
          - image: backend
            dockerfile: docker/Dockerfile.backend
            context: .
          - image: pages
            dockerfile: docker/Dockerfile.pages
            context: .
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Deploy to testnet server ─────────────────────────────────────────
  deploy:
    name: Deploy to Testnet
    needs: build
    runs-on: ubuntu-latest
    environment: testnet

    steps:
      - uses: actions/checkout@v5

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/87856119115/locations/global/workloadIdentityPools/github-ci/providers/github-oidc"
          service_account: "github-ci-deploy@onsocial-protocol.iam.gserviceaccount.com"

      - name: Fetch SSH key from Secret Manager
        id: ssh
        run: |
          gcloud secrets versions access latest \
            --secret="hetzner-testnet-ssh-key" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # Mask every line of the key so it never appears in logs
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done < /tmp/deploy_key
          echo "key<<SSHEOF" >> "$GITHUB_OUTPUT"
          cat /tmp/deploy_key >> "$GITHUB_OUTPUT"
          echo "SSHEOF" >> "$GITHUB_OUTPUT"
          rm -f /tmp/deploy_key

      - name: Generate deploy env from GSM
        run: |
          NEAR_NETWORK=testnet \
          PUBLIC_DOMAIN=testnet.onsocial.id \
          bash scripts/pull-secrets.sh > /tmp/deploy_gsm.env
          chmod 600 /tmp/deploy_gsm.env
          grep -q '^TELEGRAM_BOT_TOKEN=' /tmp/deploy_gsm.env || { echo '❌ TELEGRAM_BOT_TOKEN missing in GSM output'; exit 1; }
          grep -q '^ADMIN_SECRET=' /tmp/deploy_gsm.env || { echo '❌ ADMIN_SECRET missing in GSM output'; exit 1; }

      - name: Sync config files to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ steps.ssh.outputs.key }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ env.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/deploy_key \
            deployment/docker-compose.yml \
            deployment/Caddyfile.relayer \
            deployment/init-extra-dbs.sh \
            /tmp/deploy_gsm.env \
            "root@${{ env.DEPLOY_HOST }}:/opt/onsocial/"
          scp -i ~/.ssh/deploy_key \
            deployment/Caddyfile \
            "root@${{ env.DEPLOY_HOST }}:/opt/onsocial/Caddyfile.template"
          ssh -i ~/.ssh/deploy_key "root@${{ env.DEPLOY_HOST }}" \
            'chmod 600 /opt/onsocial/deploy_gsm.env && chmod +x /opt/onsocial/init-extra-dbs.sh'
          echo "✅ Config files synced to server"

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            root@${{ env.DEPLOY_HOST }} 'bash -seu' <<'REMOTE_SCRIPT'
            set -euo pipefail
            cd /opt/onsocial

            upsert_env() {
              local key="$1" value="$2"
              if grep -q "^${key}=" .env.production; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env.production
              else
                printf '%s=%s\n' "$key" "$value" >> .env.production
              fi
            }

            if [ ! -f .env.production ]; then
              echo "❌ Missing /opt/onsocial/.env.production"
              exit 1
            fi

            if [ -f deploy_gsm.env ]; then
              while IFS= read -r line; do
                [ -z "$line" ] && continue
                case "$line" in
                  \#*) continue ;;
                esac
                key="${line%%=*}"
                value="${line#*=}"
                upsert_env "$key" "$value"
              done < deploy_gsm.env
            else
              echo "⚠️  /opt/onsocial/deploy_gsm.env not found — GSM secrets not refreshed"
            fi

            upsert_env "NEAR_NETWORK" "testnet"
            upsert_env "RELAYER_ACCOUNT_ID" "relayer.onsocial.testnet"
            upsert_env "RELAYER_ALLOWED_CONTRACTS" "core.onsocial.testnet,scarces.onsocial.testnet,rewards.onsocial.testnet"
            upsert_env "RELAYER_CONTRACT_ID" "core.onsocial.testnet"
            upsert_env "SOCIAL_TOKEN_CONTRACT" "token.onsocial.testnet"
            upsert_env "STAKING_CONTRACT" "staking.onsocial.testnet"
            upsert_env "MARKETPLACE_CONTRACT" "marketplace.onsocial.testnet"
            upsert_env "GCP_KMS_KEYRING_0" "relayer-keys-testnet"
            upsert_env "GCP_KMS_KEYRING_1" "relayer-keys-inst-1"
            upsert_env "PUBLIC_DOMAIN" "testnet.onsocial.id"
            upsert_env "WEBHOOK_URL" "https://testnet.onsocial.id/webhooks/telegram"
            upsert_env "CORS_ORIGINS" "https://testnet.onsocial.id,http://localhost:3000,http://localhost:4000"
            upsert_env "HASURA_GRAPHQL_CORS_DOMAIN" "https://testnet.onsocial.id,http://localhost:3000"
            upsert_env "NEARBLOCKS_API_URL" "https://api-testnet.nearblocks.io"

            # ── Health check helpers ─────────────────────────────────
            check_health() {
              local name="$1" url="$2" retries="${3:-20}" delay="${4:-3}"
              for i in $(seq 1 "$retries"); do
                if curl -sf --max-time 5 "$url" > /dev/null 2>&1; then
                  echo "  ✅ $name healthy (attempt $i/$retries)"
                  return 0
                fi
                echo "  ⏳ $name not ready ($i/$retries)..."
                sleep "$delay"
              done
              echo "  ❌ $name failed after $retries attempts"
              return 1
            }
            check_container_health() {
              local name="$1" service="$2" url="$3" retries="${4:-20}" delay="${5:-3}"
              for i in $(seq 1 "$retries"); do
                if docker compose exec -T "$service" curl -sf --max-time 5 "$url" </dev/null > /dev/null 2>&1 \
                || docker compose exec -T "$service" wget -qO- --timeout=5 "$url" </dev/null > /dev/null 2>&1; then
                  echo "  ✅ $name healthy (attempt $i/$retries)"
                  return 0
                fi
                echo "  ⏳ $name not ready ($i/$retries)..."
                sleep "$delay"
              done
              echo "  ❌ $name failed after $retries attempts"
              return 1
            }
            print_service_logs() {
              local service="$1"
              echo "----- ${service} logs (last 200 lines) -----"
              docker compose logs --tail=200 "$service" </dev/null || true
              echo "----- end ${service} logs -----"
            }

            # ── Rollback helper (skips if no previous tag) ───────────
            rollback() {
              local services="$1"
              if [ "$PREV_TAG" = "unknown" ]; then
                echo "⚠️  No previous tag — cannot rollback, just restarting current"
                docker compose up -d --no-deps $services </dev/null
              else
                echo "IMAGE_TAG=$PREV_TAG" > .env.image
                set -a && source .env.production && source .env.image && set +a
                docker compose pull $services </dev/null || true
                docker compose up -d --no-deps $services </dev/null
              fi
            }

            # ── Save previous tag for rollback ───────────────────────
            PREV_TAG="unknown"
            [ -f .env.image ] && PREV_TAG=$(grep IMAGE_TAG .env.image | cut -d= -f2)
            echo "Previous tag: $PREV_TAG"

            # ── Set new image tag ────────────────────────────────────
            echo "IMAGE_TAG=${{ steps.sha.outputs.short }}" > .env.image
            set -a && source .env.production && source .env.image && set +a

            # ── Render live Caddyfile from template ──────────────────
            sed \
              -e 's/__SERVER_NAMES__/testnet.onsocial.id/g' \
              -e 's/__BACKEND_UPSTREAM__/backend:4001/g' \
              -e 's/__GATEWAY_UPSTREAM__/gateway:8080/g' \
              Caddyfile.template > Caddyfile

            # ── Pull new images ──────────────────────────────────────
            docker compose pull caddy gateway notification-worker relayer-0 relayer-1 backend pages </dev/null

            # ── Rolling restart: relayer-1 → verify → relayer-0 → verify
            echo "Rolling relayer-1..."
            docker compose up -d --no-deps relayer-1 </dev/null
            if ! check_container_health "relayer-1" "relayer-1" "http://localhost:3040/ready" 20 3; then
              echo "❌ relayer-1 health check failed — rolling back"
              rollback "relayer-1"
              exit 1
            fi

            echo "Rolling relayer-0..."
            docker compose up -d --no-deps relayer-0 </dev/null
            if ! check_container_health "relayer-0" "relayer-0" "http://localhost:3040/ready" 20 3; then
              echo "❌ relayer-0 health check failed — rolling back"
              rollback "relayer-0 relayer-1"
              exit 1
            fi

            # ── Gateway restart → verify → then Caddy ────────────────
            echo "Rolling gateway..."
            docker compose up -d --no-deps gateway </dev/null
            if ! check_container_health "gateway" "gateway" "http://localhost:8080/health" 20 3; then
              echo "❌ Gateway health check failed — rolling back"
              rollback "gateway relayer-0 relayer-1"
              exit 1
            fi

            # ── Run gateway SQL migrations (tracked + locked) ─────
            echo "Running gateway migrations..."
            DATABASE_URL="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
            docker compose exec -T -e DATABASE_URL="$DATABASE_URL" gateway \
              node packages/onsocial-gateway/dist/scripts/apply-migrations.js </dev/null

            # ── Sync Hasura permissions (idempotent — skips existing) ─
            echo "Syncing Hasura permissions..."
            docker compose exec -T gateway \
              node packages/onsocial-gateway/dist/scripts/apply-hasura-permissions.js create </dev/null

            echo "Restarting notification worker..."
            docker compose up -d --no-deps notification-worker </dev/null
            for i in $(seq 1 20); do
              status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' notification-worker </dev/null 2>/dev/null || true)"
              if [ "$status" = "healthy" ] || [ "$status" = "running" ]; then
                echo "  ✅ notification-worker healthy (attempt $i/20)"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "❌ notification-worker health check failed — rolling back"
                rollback "notification-worker gateway relayer-0 relayer-1"
                exit 1
              fi
              echo "  ⏳ notification-worker not ready ($i/20)..."
              sleep 3
            done

            echo "Reloading caddy..."
            docker compose up -d --no-deps caddy </dev/null
            if ! check_health "caddy (public)" "https://testnet.onsocial.id/health" 10 5; then
              echo "❌ Public health check failed — rolling back"
              rollback "caddy gateway relayer-0 relayer-1"
              exit 1
            fi

            if [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then
              echo "❌ TELEGRAM_BOT_TOKEN is not set after GSM refresh"
              exit 1
            fi

            if [ -z "${ADMIN_SECRET:-}" ]; then
              echo "❌ ADMIN_SECRET is not set after GSM refresh"
              exit 1
            fi

            # ── Backend (Telegram rewards bot) ───────────────────────
            echo "Rolling backend..."
            docker compose up -d --no-deps backend </dev/null
            if ! check_container_health "backend" "backend" "http://localhost:4001/health" 24 5; then
              print_service_logs "backend"
              echo "❌ Backend health check failed — rolling back"
              rollback "backend gateway relayer-0 relayer-1"
              exit 1
            fi

            # ── Pages (profile page renderer) ────────────────────────
            echo "Rolling pages..."
            docker compose up -d --no-deps pages </dev/null
            if ! check_container_health "pages" "pages" "http://localhost:3456/health" 15 3; then
              print_service_logs "pages"
              echo "⚠️  Pages health check failed (non-blocking)"
            fi

            # ── Bring up any remaining services ──────────────────────
            FINAL_SERVICES="postgres hasura relayer-lb relayer-0 relayer-1 gateway notification-worker caddy backend pages"
            docker compose up -d --no-deps $FINAL_SERVICES </dev/null

            echo ""
            docker compose ps --format "table {{.Name}}\t{{.Status}}" </dev/null
            echo ""
            rm -f deploy_gsm.env
          REMOTE_SCRIPT
            echo "✅ Testnet deploy complete — ${{ steps.sha.outputs.short }} (prev: $PREV_TAG)"
