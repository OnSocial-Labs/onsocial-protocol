name: Deploy Mainnet

# Manual trigger only — mainnet deploys require explicit human action
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-mainnet" to confirm'
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/onsocial-labs/onsocial-protocol

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # ── Safety gate ──────────────────────────────────────────────────────
  validate:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-mainnet" ]; then
            echo "❌ Confirmation failed. Type 'deploy-mainnet' to proceed."
            exit 1
          fi
          echo "✅ Confirmation accepted"

  # ── Build & push Docker images to GHCR ──────────────────────────────
  build:
    name: Build Images
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: caddy
            dockerfile: docker/Dockerfile.caddy
            context: docker
          - image: gateway
            dockerfile: docker/Dockerfile.gateway
            context: .
          - image: relayer
            dockerfile: docker/Dockerfile.relayer
            context: .
          - image: backend
            dockerfile: docker/Dockerfile.backend
            context: .
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=
            type=raw,value=mainnet-latest

      - name: Build & push
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Deploy to mainnet server ─────────────────────────────────────────
  deploy:
    name: Deploy to Mainnet
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: mainnet

    steps:
      - uses: actions/checkout@v5

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: "projects/87856119115/locations/global/workloadIdentityPools/github-ci/providers/github-oidc"
          service_account: "github-ci-deploy@onsocial-protocol.iam.gserviceaccount.com"

      - name: Fetch SSH key from Secret Manager
        id: ssh
        run: |
          gcloud secrets versions access latest \
            --secret="hetzner-mainnet-ssh-key" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          # Mask every line of the key so it never appears in logs
          while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done < /tmp/deploy_key
          echo "key<<SSHEOF" >> "$GITHUB_OUTPUT"
          cat /tmp/deploy_key >> "$GITHUB_OUTPUT"
          echo "SSHEOF" >> "$GITHUB_OUTPUT"
          rm -f /tmp/deploy_key

      - name: Sync config files to server
        run: |
          mkdir -p ~/.ssh
          echo "${{ steps.ssh.outputs.key }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 135.181.110.183 >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/deploy_key \
            deployment/docker-compose.yml \
            deployment/Caddyfile \
            deployment/Caddyfile.relayer \
            deployment/init-extra-dbs.sh \
            root@135.181.110.183:/opt/onsocial/
          ssh -i ~/.ssh/deploy_key root@135.181.110.183 \
            'chmod +x /opt/onsocial/init-extra-dbs.sh'
          echo "✅ Config files synced to server"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 135.181.110.183
          username: root
          key: ${{ steps.ssh.outputs.key }}
          script: |
            set -euo pipefail
            cd /opt/onsocial

            upsert_env() {
              local key="$1" value="$2"
              if grep -q "^${key}=" .env.production; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env.production
              else
                printf '%s=%s\n' "$key" "$value" >> .env.production
              fi
            }

            if [ ! -f .env.production ]; then
              echo "❌ Missing /opt/onsocial/.env.production"
              exit 1
            fi

            upsert_env "NEAR_NETWORK" "mainnet"
            upsert_env "RELAYER_ACCOUNT_ID" "relayer.onsocial.near"
            upsert_env "RELAYER_CONTRACT_ID" "core.onsocial.near"
            upsert_env "SOCIAL_TOKEN_CONTRACT" "token.onsocial.near"
            upsert_env "STAKING_CONTRACT" "staking.onsocial.near"
            upsert_env "MARKETPLACE_CONTRACT" "marketplace.onsocial.near"
            upsert_env "GCP_KMS_KEYRING_0" "relayer-keys-mainnet"
            upsert_env "GCP_KMS_KEYRING_1" "relayer-keys-mainnet-inst-1"
            upsert_env "PUBLIC_DOMAIN" "api.onsocial.id"
            upsert_env "CORS_ORIGINS" "https://onsocial.id,https://app.onsocial.id"
            upsert_env "HASURA_GRAPHQL_CORS_DOMAIN" "https://onsocial.id,https://app.onsocial.id"
            upsert_env "NEARBLOCKS_API_URL" "https://api.nearblocks.io"

            # ── Health check helpers ─────────────────────────────────
            check_health() {
              local name="$1" url="$2" retries="${3:-20}" delay="${4:-3}"
              for i in $(seq 1 "$retries"); do
                if curl -sf --max-time 5 "$url" > /dev/null 2>&1; then
                  echo "  ✅ $name healthy (attempt $i/$retries)"
                  return 0
                fi
                echo "  ⏳ $name not ready ($i/$retries)..."
                sleep "$delay"
              done
              echo "  ❌ $name failed after $retries attempts"
              return 1
            }
            check_container_health() {
              local name="$1" service="$2" url="$3" retries="${4:-20}" delay="${5:-3}"
              for i in $(seq 1 "$retries"); do
                if docker compose exec -T "$service" wget -qO- "$url" > /dev/null 2>&1; then
                  echo "  ✅ $name healthy (attempt $i/$retries)"
                  return 0
                fi
                echo "  ⏳ $name not ready ($i/$retries)..."
                sleep "$delay"
              done
              echo "  ❌ $name failed after $retries attempts"
              return 1
            }
            print_service_logs() {
              local service="$1"
              echo "----- ${service} logs (last 200 lines) -----"
              docker compose logs --tail=200 "$service" || true
              echo "----- end ${service} logs -----"
            }

            # ── Rollback helper (skips if no previous tag) ───────────
            rollback() {
              local services="$1"
              if [ "$PREV_TAG" = "unknown" ]; then
                echo "⚠️  No previous tag — cannot rollback, just restarting current"
                docker compose up -d --no-deps $services
              else
                echo "IMAGE_TAG=$PREV_TAG" > .env.image
                set -a && source .env.production && source .env.image && set +a
                docker compose pull $services || true
                docker compose up -d --no-deps $services
              fi
            }

            # ── Save previous tag for rollback ───────────────────────
            PREV_TAG="unknown"
            [ -f .env.image ] && PREV_TAG=$(grep IMAGE_TAG .env.image | cut -d= -f2)
            echo "Previous tag: $PREV_TAG"

            # ── Set new image tag ────────────────────────────────────
            echo "IMAGE_TAG=${{ steps.sha.outputs.short }}" > .env.image
            set -a && source .env.production && source .env.image && set +a

            # ── Pull new images ──────────────────────────────────────
            docker compose pull caddy gateway relayer-0 relayer-1 backend

            # ── Rolling restart: relayer-1 → verify → relayer-0 → verify
            echo "Rolling relayer-1..."
            docker compose up -d --no-deps relayer-1
            if ! check_health "relayer-1" "http://localhost:3040/ready" 20 3; then
              echo "❌ relayer-1 health check failed — rolling back"
              rollback "relayer-1"
              exit 1
            fi

            echo "Rolling relayer-0..."
            docker compose up -d --no-deps relayer-0
            sleep 10  # let relayer-0 stabilize (relayer-1 serves traffic)

            # ── Gateway restart → verify → then Caddy ────────────────
            echo "Rolling gateway..."
            docker compose up -d --no-deps gateway
            if ! check_container_health "gateway" "gateway" "http://localhost:8080/health" 20 3; then
              echo "❌ Gateway health check failed — rolling back"
              rollback "gateway relayer-0 relayer-1"
              exit 1
            fi

            echo "Reloading caddy..."
            docker compose up -d --no-deps caddy
            if ! check_health "caddy (public)" "https://mainnet.onsocial.id/health" 10 5; then
              echo "⚠️  Public health check failed — services may still be starting"
            fi

            # ── Backend (Telegram rewards bot) ───────────────────────
            if [ -n "${TELEGRAM_BOT_TOKEN:-}" ]; then
              echo "Rolling backend..."
              docker compose up -d --no-deps backend
              if ! check_container_health "backend" "backend" "http://localhost:4001/health" 24 5; then
                print_service_logs "backend"
                echo "⚠️  Backend health check failed — bot may need manual restart"
              fi
            else
              echo "⚠️  TELEGRAM_BOT_TOKEN is not set — skipping backend rollout and health check"
            fi

            # ── Bring up any remaining services ──────────────────────
            FINAL_SERVICES="postgres hasura relayer-lb relayer-0 relayer-1 gateway caddy"
            if [ -n "${TELEGRAM_BOT_TOKEN:-}" ]; then
              FINAL_SERVICES="$FINAL_SERVICES backend"
            fi
            docker compose up -d $FINAL_SERVICES

            echo ""
            docker compose ps --format "table {{.Name}}\t{{.Status}}"
            echo ""
            echo "✅ Mainnet deploy complete — ${{ steps.sha.outputs.short }} (prev: $PREV_TAG)"

      - name: Notify deploy result
        if: always()
        run: |
          STATUS="${{ job.status }}"
          SHA="${{ steps.sha.outputs.short }}"
          TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          [ -z "$TOKEN" ] || [ -z "$CHAT_ID" ] && exit 0
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅" MSG="Mainnet deploy succeeded"
          else
            EMOJI="❌" MSG="Mainnet deploy FAILED"
          fi
          TEXT="$EMOJI *$MSG* — \`$SHA\` [run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          curl -sf -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -H 'Content-Type: application/json' \
            -d "{\"chat_id\": \"$CHAT_ID\", \"text\": \"$TEXT\", \"parse_mode\": \"Markdown\"}" || true
